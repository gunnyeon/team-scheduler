            }}
            onMouseUp={()=>{isDragging.current=false;if(canvasRef.current){canvasRef.current.style.cursor=selectedId?"default":"grab";canvasRef.current.style.userSelect="";}}}
            onMouseLeave={()=>{isDragging.current=false;if(canvasRef.current){canvasRef.current.style.cursor=selectedId?"default":"grab";canvasRef.current.style.userSelect="";}}}
            style={{flex:1,overflow:"auto",cursor:selectedId?"default":"grab"}}>
            {renderCanvas()}
          </div>
        </div>
      </div>

      {/* 자동생성 확인 모달 */}
      {autoGenConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:700,
          display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
          onClick={()=>setAutoGenConfirm(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,width:380,
            boxShadow:"0 8px 40px rgba(0,0,0,0.2)",overflow:"hidden"}}>
            <div style={{height:4,background:"linear-gradient(90deg,#6C63FF,#9F7AEA)"}}/>
            <div style={{padding:"24px 24px 20px",textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:12}}>🔄</div>
              <h3 style={{margin:"0 0 10px",fontSize:16,fontWeight:800,color:"#1A1A2E"}}>조직도 자동 생성</h3>
              <p style={{margin:"0 0 6px",fontSize:13,color:"#4A5568"}}>
                인원 DB에서 <strong>부서명 = "{site.name}"</strong>인 인원을<br/>
                <strong>직종 → 직군 → 직위</strong> 순으로 배치합니다.
              </p>
              <p style={{margin:"0 0 6px",fontSize:12,color:"#6C63FF"}}>
                • 중복 인원 자동 제거 (사번 기준)<br/>
                • 기존 조직도 데이터는 전체 교체됩니다
              </p>
              <p style={{margin:"0 0 20px",fontSize:12,color:"#EF4444",fontWeight:600}}>⚠ 이 현장의 기존 조직도는 삭제됩니다.</p>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setAutoGenConfirm(false)}
                  style={{flex:1,background:"#F7FAFC",border:"1px solid #CBD5E0",
                  borderRadius:10,padding:"11px",fontSize:13,color:"#718096",cursor:"pointer",fontWeight:600}}>취소</button>
                <button onClick={autoGenerateOrg}
                  style={{flex:1,background:"linear-gradient(90deg,#6C63FF,#9F7AEA)",
                  border:"none",borderRadius:10,padding:"11px",fontSize:13,color:"#fff",cursor:"pointer",fontWeight:700}}>생성</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 노드 추가/수정 모달 */}
      {modalForm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.5)",zIndex:600,
          display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
          onClick={()=>{setModalForm(null);setNameSuggest([]);}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,
            width:"100%",maxWidth:420,boxShadow:"0 8px 40px rgba(0,0,0,0.2)",
            overflow:"hidden",maxHeight:"92vh",overflowY:"auto"}}>
            <div style={{height:4,background:"linear-gradient(90deg,#6C63FF,#9F7AEA)"}}/>
            <div style={{padding:"20px 22px"}}>
              <h3 style={{margin:"0 0 16px",fontSize:15,fontWeight:800,color:"#1A1A2E"}}>
                {modalForm.isNew?"+ 노드 추가":"✏ 노드 수정"}
              </h3>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{position:"relative"}}>
                  <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>성명</label>
                  <input value={modalForm.name} onChange={onNameChange} placeholder="인원 DB 자동완성" style={inp2}/>
                  {nameSuggest.length>0&&(
                    <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",
                      border:"1px solid #CBD5E0",borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",
                      zIndex:50,overflow:"hidden",maxHeight:200,overflowY:"auto"}}>
                      {nameSuggest.map(p=>{
                        const rgS=mapJobTypeToRoleGroup(p.job_type,p.position);
                        const gcS2=getGroupColor(rgS);
                        return(
                          <div key={p.id||p.emp_id||p.name} onClick={()=>applyPersonnel(p)}
                            style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #EEF2F7",
                            display:"flex",alignItems:"center",gap:8}}
                            onMouseEnter={e=>e.currentTarget.style.background="#F8F7FF"}
                            onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                            <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,
                              background:gcS2+"22",color:gcS2,fontWeight:700}}>{rgS}</span>
                            <span style={{fontSize:13,fontWeight:700,color:"#1A1A2E"}}>{p.name}</span>
                            <span style={{fontSize:10,color:"#718096",flex:1}}>
                              {[p.position,p.job_type,p.department].filter(Boolean).join(" · ")}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>직종</label>
                    <select value={modalForm.job_type} onChange={e=>{
                      const jt=e.target.value;
                      setModalForm(f=>({...f,job_type:jt,role_group:mapJobTypeToRoleGroup(jt,f.position)}));
                    }} style={inp2}>
                      {JOB_TYPES.map(j=><option key={j}>{j}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>직군</label>
                    <select value={modalForm.role_group} onChange={mf("role_group")} style={inp2}>
                      {ORG_GROUPS.map(g=><option key={g.label}>{g.label}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>직위</label>
                    <input value={modalForm.position} onChange={mf("position")} placeholder="부장, 차장..." style={inp2}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>직급</label>
                    <input value={modalForm.rank} onChange={mf("rank")} placeholder="3급, 4급..." style={inp2}/>
                  </div>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>사원구분</label>
                  <div style={{display:"flex",gap:6}}>
                    {["정규직","비정규직"].map(t=>(
                      <button key={t} onClick={()=>setModalForm(f=>({...f,emp_type:t}))}
                        style={{flex:1,padding:"8px",borderRadius:8,
                        border:`1px solid ${modalForm.emp_type===t?"#6C63FF":"#CBD5E0"}`,
                        background:modalForm.emp_type===t?"#6C63FF":"#fff",
                        color:modalForm.emp_type===t?"#fff":"#4A5568",
                        fontSize:12,fontWeight:700,cursor:"pointer"}}>{t}</button>
                    ))}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>나이(만)</label>
                    <input type="number" value={modalForm.age} onChange={mf("age")} placeholder="45" style={inp2}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>전화번호</label>
                    <input value={modalForm.phone} onChange={mf("phone")} placeholder="010-0000-0000" style={inp2}/>
                  </div>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>비고</label>
                  <input value={modalForm.memo} onChange={mf("memo")} placeholder="자유 메모" style={inp2}/>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>상위 노드 (종속 관계)</label>
                  <select value={modalForm.parentId||""} onChange={mf("parentId")} style={inp2}>
                    <option value="">── 최상위 (없음)</option>
                    {nodes.filter(n=>n.id!==modalForm.nodeId)
                      .sort((a,b)=>positionSortKey(a.position)-positionSortKey(b.position))
                      .map(n=>(
                        <option key={n.id} value={n.id}>
                          {n.name} ({n.position||n.role_group||"−"}) [{n.job_type||"−"}]
                        </option>
                      ))}
                  </select>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:16}}>
                <button onClick={()=>{setModalForm(null);setNameSuggest([]);}}
                  style={{flex:1,background:"#F7FAFC",border:"1px solid #CBD5E0",
                  borderRadius:10,padding:"11px",fontSize:13,color:"#718096",cursor:"pointer",fontWeight:600}}>취소</button>
                <button onClick={saveNode}
                  style={{flex:2,background:"#6C63FF",border:"none",
                  borderRadius:10,padding:"11px",fontSize:13,color:"#fff",cursor:"pointer",fontWeight:700}}>저장</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 관리자 암호 */}
      {showAdminPw&&(
        <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.5)",zIndex:600,
          display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
          onClick={()=>setShowAdminPw(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,width:320,
            boxShadow:"0 8px 40px rgba(0,0,0,0.18)",overflow:"hidden"}}>
            <div style={{height:4,background:"linear-gradient(90deg,#6C63FF,#9F7AEA)"}}/>
            <div style={{padding:"24px 24px 20px",textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:12}}>🔐</div>
              <h3 style={{margin:"0 0 8px",fontSize:15,fontWeight:800,color:"#1A1A2E"}}>관리자 인증</h3>
              <input type="password" value={adminPwInput} onChange={e=>setAdminPwInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"){if(adminPwInput==="dongbu"){setShowAdminPw(false);setShowPersonnelMgr(true);}else setAdminPwError("암호가 틀렸습니다.");}}}
                placeholder="관리자 암호" autoFocus
                style={{width:"100%",border:`1px solid ${adminPwError?"#F87171":"#CBD5E0"}`,
                borderRadius:10,padding:"10px 14px",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:6}}/>
              {adminPwError&&<p style={{margin:"0 0 10px",fontSize:11,color:"#F87171"}}>{adminPwError}</p>}
              <button onClick={()=>{if(adminPwInput==="dongbu"){setShowAdminPw(false);setShowPersonnelMgr(true);}else setAdminPwError("암호가 틀렸습니다.");}}
                style={{width:"100%",background:"#6C63FF",border:"none",borderRadius:10,
                padding:"11px",fontSize:13,color:"#fff",cursor:"pointer",fontWeight:700,marginTop:4}}>확인</button>
            </div>
          </div>
        </div>
      )}

      {showPersonnelMgr&&<PersonnelMgrModal personnel={personnel}
        onSave={onPersonnelSave} onDelete={onPersonnelDelete}
        onClose={()=>setShowPersonnelMgr(false)}/>}
    </div>
  );
}


function SitePMBoard({sites=[],onSave,onDelete,orgNodes=[],onOrgSave,onOrgDelete,onOrgSaveBump,onOrgReplaceForSite,personnel=[],onPersonnelSave,onPersonnelDelete,siteMinStaff=[],onMinStaffSave}){
  const [showModal,setShowModal]=useState(false);
  const [orgSite,setOrgSite]=useState(null);
  const [editing,setEditing]=useState(null);
  const [searchQ,setSearchQ]=useState("");
  const [filterCompletion,setFilterCompletion]=useState("전체");
  const [filterCostRate,setFilterCostRate]=useState("전체");
  const [filterOrderType,setFilterOrderType]=useState("전체");
  const emptyForm={name:"",pm:"",start_date:"",completion:"",location:"",scale:"",client:"",contract_amount:"",cost_rate:"",order_type:"",equity_rate:"",memo:""};
  const [form,setForm]=useState(emptyForm);
  const sf=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  function saveSite(){
    if(!form.name.trim()||!form.pm.trim()){alert("현장명과 담당PM을 입력하세요.");return;}
    onSave({...form,id:editing?editing.id:undefined});
    setShowModal(false);setEditing(null);setForm(emptyForm);
  }
  function del(id){
    if(!window.confirm("이 현장을 삭제하시겠습니까?"))return;
    onDelete(id);
  }
  function openNew(){setEditing(null);setForm(emptyForm);setShowModal(true);}
  function openEdit(s){setEditing(s);setForm({name:s.name,pm:s.pm,start_date:s.start_date||"",completion:s.completion||"",location:s.location||"",scale:s.scale||"",client:s.client||"",contract_amount:s.contract_amount||"",cost_rate:s.cost_rate||"",order_type:s.order_type||"",equity_rate:s.equity_rate||"",memo:s.memo||""});setShowModal(true);}
  const daysLeft=d=>{if(!d)return null;return Math.ceil((new Date(d+"T00:00:00")-new Date())/(1000*60*60*24));};
  // 착공일~준공일 기준 오늘 공정율 계산 (0~100%)
  const calcProgress=(start,end)=>{
    if(!start||!end)return null;
    const s=new Date(start+"T00:00:00"), e=new Date(end+"T00:00:00"), t=new Date();
    const total=e-s; if(total<=0)return null;
    const elapsed=t-s;
    if(elapsed<=0)return 0;
    if(elapsed>=total)return 100;
    return Math.round(elapsed/total*100);
  };
  const q=searchQ.trim().toLowerCase();
  // 발주방식 고유값 목록 (동적)
  const orderTypes=["전체",...Array.from(new Set(sites.map(s=>s.order_type||"").filter(Boolean))).sort((a,b)=>a.localeCompare(b,"ko"))];
  // 필터 적용 + 준공일자 오름차순 정렬
  const filtered=[...sites]
    .filter(s=>{
      if(q&&!(s.name.toLowerCase().includes(q)||s.pm.toLowerCase().includes(q)||(s.location||"").toLowerCase().includes(q)||(s.client||"").toLowerCase().includes(q)))return false;
      // 준공일자 필터
      if(filterCompletion!=="전체"){
        const days=s.completion?Math.ceil((new Date(s.completion+"T00:00:00")-new Date())/(1000*60*60*24)):null;
        if(filterCompletion==="임박(D-30)"&&!(days!==null&&days>=0&&days<=30))return false;
        if(filterCompletion==="진행중"&&!(days!==null&&days>30))return false;
        if(filterCompletion==="준공완료"&&!(days!==null&&days<0))return false;
      }
      // 원가율 필터
      if(filterCostRate!=="전체"){
        const cr=Number(s.cost_rate||0);
        if(filterCostRate==="100% 이상"&&cr<100)return false;
        if(filterCostRate==="90~99%"&&!(cr>=90&&cr<100))return false;
        if(filterCostRate==="90% 미만"&&cr>=90)return false;
      }
      // 발주방식 필터
      if(filterOrderType!=="전체"&&(s.order_type||"")!==filterOrderType)return false;
      return true;
    })
    .sort((a,b)=>{
      if(!a.completion&&!b.completion)return 0;
      if(!a.completion)return 1;
      if(!b.completion)return -1;
      return a.completion.localeCompare(b.completion);
    });
  const activeFilterCount=[filterCompletion,filterCostRate,filterOrderType].filter(v=>v!=="전체").length;
  const resetFilters=()=>{setFilterCompletion("전체");setFilterCostRate("전체");setFilterOrderType("전체");setSearchQ("");};
  const inpSt={width:"100%",border:"1px solid #CBD5E0",borderRadius:8,padding:"10px 12px",fontSize:14,color:"#2D3748",outline:"none",boxSizing:"border-box"};
  const lbl=(t,req)=><label style={{display:"block",fontSize:12,fontWeight:700,color:"#4A5568",marginBottom:5}}>{t}{req&&<span style={{color:"#F87171"}}> *</span>}</label>;
  const selSt=(active)=>({border:`1.5px solid ${active?"#6C63FF":"#CBD5E0"}`,borderRadius:8,padding:"7px 10px",fontSize:12,color:active?"#6C63FF":"#4A5568",background:active?"#EDE9FE":"#fff",fontWeight:active?700:400,cursor:"pointer",outline:"none"});
  return <div>
    {/* 검색 + 추가 버튼 */}
    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:200,position:"relative"}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#A0AEC0",fontSize:16,pointerEvents:"none"}}>🔍</span>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="현장명, PM, 위치, 발주처 검색..."
          style={{width:"100%",border:"1px solid #CBD5E0",borderRadius:10,padding:"10px 12px 10px 38px",fontSize:14,color:"#2D3748",outline:"none",boxSizing:"border-box",background:"#fff"}}/>
        {searchQ&&<button onClick={()=>setSearchQ("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#A0AEC0",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
      </div>
      <span style={{fontSize:13,color:"#718096",whiteSpace:"nowrap"}}>{filtered.length}개 현장</span>
      <button onClick={openNew} style={{...btn("#6C63FF"),fontSize:13,padding:"10px 20px",whiteSpace:"nowrap"}}>+ 현장 추가</button>
    </div>
    {/* 필터 행 */}
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:12,color:"#718096",fontWeight:600,whiteSpace:"nowrap"}}>🔧 필터</span>
      {/* 준공일자 */}
      <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#A0AEC0",whiteSpace:"nowrap"}}>준공</span>
        {["전체","임박(D-30)","진행중","준공완료"].map(v=><button key={v} onClick={()=>setFilterCompletion(v)} style={selSt(filterCompletion===v)}>{v}</button>)}
      </div>
      <div style={{width:1,height:20,background:"#E2E8F0"}}/>
      {/* 원가율 */}
      <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#A0AEC0",whiteSpace:"nowrap"}}>원가율</span>
        {["전체","90% 미만","90~99%","100% 이상"].map(v=><button key={v} onClick={()=>setFilterCostRate(v)} style={selSt(filterCostRate===v)}>{v}</button>)}
      </div>
      <div style={{width:1,height:20,background:"#E2E8F0"}}/>
      {/* 발주방식 */}
      <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#A0AEC0",whiteSpace:"nowrap"}}>발주방식</span>
        {orderTypes.map(v=><button key={v} onClick={()=>setFilterOrderType(v)} style={selSt(filterOrderType===v)}>{v}</button>)}
      </div>
      {activeFilterCount>0&&<button onClick={resetFilters} style={{...btn("#FFF5F5","#F87171"),fontSize:11,padding:"5px 10px",border:"1px solid #FCA5A5",marginLeft:4}}>✕ 초기화</button>}
    </div>
    {/* 검색/필터 결과 없음 */}
    {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#A0AEC0",fontSize:14}}>
      {q||activeFilterCount>0?"조건에 맞는 현장이 없습니다.":"등록된 현장이 없습니다."}
    </div>}
    {/* 카드 그리드 */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:18}}>
      {filtered.map(s=>{
        const days=daysLeft(s.completion);
        const urgent=days!==null&&days>=0&&days<=30;
        const done=days!==null&&days<0;
        const progress=calcProgress(s.start_date,s.completion);
        const progColor=done?"#94A3B8":progress>=80?"#F87171":progress>=50?"#FBBF24":"#6C63FF";
        const dTag=done
          ?<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#F7FAFC",color:"#A0AEC0",fontWeight:700,border:"1px solid #CBD5E0"}}>준공완료</span>
          :urgent?<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#FFFBEB",color:"#D97706",fontWeight:800,border:"1px solid #FBBF24"}}>⚠ D-{days}</span>
          :<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#EDE9FE",color:"#6C63FF",fontWeight:700,border:"1px solid #C4B5FD"}}>D-{days??"-"}</span>;
        return <div key={s.id} style={{background:"#fff",border:`1px solid ${urgent?"#FBBF24":done?"#E2E8F0":"#E2E8F0"}`,borderRadius:16,boxShadow:`0 2px 10px rgba(0,0,0,0.07)`,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {/* 상단 컬러바 */}
          <div style={{height:5,background:done?"#CBD5E0":urgent?"linear-gradient(90deg,#FBBF24,#F87171)":"linear-gradient(90deg,#6C63FF,#9F7AEA)"}}/>
          <div style={{padding:"18px 20px",flex:1}}>
            {/* 헤더 행: 현장명 + D-태그 */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div style={{flex:1,paddingRight:8}}>
                <p style={{margin:"0 0 3px",fontSize:11,color:"#A0AEC0",fontWeight:600,letterSpacing:0.5}}>현장명</p>
                <h3 style={{margin:0,fontSize:16,fontWeight:800,color:"#1A1A2E",lineHeight:1.35}}>{s.name}</h3>
              </div>
              {dTag}
            </div>
            {/* PM 정보 */}
            <div style={{display:"flex",alignItems:"center",gap:10,background:"#F8FAFC",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:getAvatarColor(s.pm),display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:"#fff",flexShrink:0}}>{(s.pm||"?")[0]}</div>
              <div style={{flex:1}}>
                <p style={{margin:0,fontSize:11,color:"#A0AEC0",fontWeight:600}}>담당 PM</p>
                <p style={{margin:0,fontSize:15,fontWeight:800,color:"#2D3748"}}>{s.pm||"미지정"}</p>
              </div>
            </div>
            {/* 공정율 바 */}
            {progress!==null&&<div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:700,color:"#4A5568"}}>📊 공정율</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:15,fontWeight:800,color:progColor}}>{progress}%</span>
                  {done&&<span style={{fontSize:10,color:"#A0AEC0",fontWeight:600}}>완료</span>}
                </div>
              </div>
              <div style={{height:10,background:"#E2E8F0",borderRadius:6,overflow:"hidden",position:"relative"}}>
                <div style={{height:"100%",width:`${progress}%`,background:done?"#CBD5E0":`linear-gradient(90deg,#6C63FF,${progColor})`,borderRadius:6,transition:"width 0.6s ease"}}/>
              </div>
              {s.start_date&&s.completion&&<div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                <span style={{fontSize:10,color:"#A0AEC0"}}>착공 {s.start_date}</span>
                <span style={{fontSize:10,color:"#A0AEC0"}}>준공 {s.completion}</span>
              </div>}
            </div>}
            {/* 현장 상세 정보 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {[
                {label:"착공일자",value:s.start_date?`${s.start_date} (${getDayOfWeek(s.start_date)})`:"-",color:"#4A5568"},
                {label:"준공일자",value:s.completion?`${s.completion} (${getDayOfWeek(s.completion)})`:"-",color:done?"#A0AEC0":urgent?"#D97706":"#2D3748"},
                {label:"현장 위치",value:s.location||"-",color:"#4A5568"},
                {label:"규모",value:s.scale||"-",color:"#4A5568"},
                {label:"도급액(당사분)",value:s.contract_amount||"-",color:"#2D3748"},
                {label:"원가율",value:s.cost_rate?`${s.cost_rate}%`:"-",color:s.cost_rate&&Number(s.cost_rate)>=100?"#DC2626":s.cost_rate&&Number(s.cost_rate)>=90?"#D97706":"#2D3748"},
                {label:"발주처",value:s.client||"-",color:"#4A5568"},
                {label:"발주방식",value:s.order_type||"-",color:"#4A5568"},
                {label:"지분율",value:s.equity_rate||"-",color:"#4A5568"},
              ].map(({label,value,color})=><div key={label} style={{background:"#F8FAFC",borderRadius:8,padding:"8px 10px"}}>
                <p style={{margin:"0 0 2px",fontSize:10,color:"#A0AEC0",fontWeight:600}}>{label}</p>
                <p style={{margin:0,fontSize:12,fontWeight:700,color}}>{value}</p>
              </div>)}
            </div>
            {s.memo&&<p style={{margin:0,fontSize:12,color:"#718096",background:"#FFFBEB",borderRadius:8,padding:"8px 10px",lineHeight:1.5,borderLeft:"3px solid #FBBF24"}}>📌 {s.memo}</p>}
          </div>
          {/* 액션 버튼 */}
          <div style={{padding:"10px 20px 14px",display:"flex",gap:8,borderTop:"1px solid #F0F4F8"}}>
            <button onClick={()=>setOrgSite(s)} style={{flex:1,...btn("#F0FDF4","#15803D"),fontSize:12,padding:"7px 0"}}>🏢 조직도</button>
            <button onClick={()=>openEdit(s)} style={{flex:1,...btn("#EEF2F7","#6C63FF"),fontSize:12,padding:"7px 0"}}>✏ 수정</button>
            <button onClick={()=>del(s.id)} style={{flex:1,...btn("#FFF5F5","#F87171"),fontSize:12,padding:"7px 0"}}>🗑 삭제</button>
          </div>
        </div>;
      })}
    </div>
    {/* 조직도 모달 */}
    {orgSite&&<OrgChartModal site={orgSite} onClose={()=>setOrgSite(null)} orgNodes={orgNodes} onOrgSave={onOrgSave} onOrgDelete={onOrgDelete} onOrgSaveBump={onOrgSaveBump} onOrgReplaceForSite={onOrgReplaceForSite} personnel={personnel} onPersonnelSave={onPersonnelSave} onPersonnelDelete={onPersonnelDelete} siteMinStaff={siteMinStaff} onMinStaffSave={onMinStaffSave} isAdmin={false}/>}
    {/* 추가/수정 모달 */}
    {showModal&&<div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16,overflowY:"auto"}}>
      <div style={{background:"#fff",borderRadius:18,padding:"28px 30px",width:"100%",maxWidth:520,boxShadow:"0 8px 40px rgba(0,0,0,0.18)",margin:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#6C63FF"}}>{editing?"현장 정보 수정":"새 현장 추가"}</h2>
          <button onClick={()=>{setShowModal(false);setEditing(null);}} style={{background:"none",border:"none",fontSize:24,color:"#A0AEC0",cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{gridColumn:"1/-1"}}>{lbl("현장명",true)}<input value={form.name} onChange={sf("name")} placeholder="○○ 신축공사" style={inpSt}/></div>
            <div>{lbl("담당 PM",true)}<input value={form.pm} onChange={sf("pm")} placeholder="홍길동" style={inpSt}/></div>
            <div>{lbl("착공일자")}<input type="date" value={form.start_date} onChange={sf("start_date")} style={inpSt}/></div>
            <div>{lbl("준공일자")}<input type="date" value={form.completion} onChange={sf("completion")} style={inpSt}/></div>
            <div>{lbl("현장 위치")}<input value={form.location} onChange={sf("location")} placeholder="서울 강남구" style={inpSt}/></div>
            <div>{lbl("규모")}<input value={form.scale} onChange={sf("scale")} placeholder="지상 5층" style={inpSt}/></div>
            <div style={{gridColumn:"1/-1"}}>{lbl("발주처")}<input value={form.client} onChange={sf("client")} placeholder="○○건설" style={inpSt}/></div>
            <div>{lbl("도급액(당사분)")}<input value={form.contract_amount} onChange={sf("contract_amount")} placeholder="예: 50억" style={inpSt}/></div>
            <div>{lbl("원가율 (%)")}<input type="number" min="0" max="200" value={form.cost_rate} onChange={sf("cost_rate")} placeholder="예: 85" style={inpSt}/></div>
            <div>{lbl("발주방식")}<input value={form.order_type} onChange={sf("order_type")} placeholder="예: 일괄도급" style={inpSt}/></div>
            <div>{lbl("지분율")}<input value={form.equity_rate} onChange={sf("equity_rate")} placeholder="예: 50% (단독)" style={inpSt}/></div>
            <div style={{gridColumn:"1/-1"}}>{lbl("비고")}<textarea value={form.memo} onChange={sf("memo")} rows={2} placeholder="특이사항 메모" style={{...inpSt,resize:"vertical"}}/></div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:22,justifyContent:"flex-end"}}>
          <button onClick={()=>{setShowModal(false);setEditing(null);}} style={{...btn("#F7FAFC","#718096"),border:"1px solid #CBD5E0"}}>취소</button>
          <button onClick={saveSite} style={btn("#6C63FF")}>저장</button>
        </div>
      </div>
    </div>}
  </div>;
}


// ── 리포트 ────────────────────────────────────────────
function PersonnelDashboard({personnel=[],orgNodes=[],sites=[],siteMinStaff=[]}){
  // ── 본부 전체 통계 ──
  const total=personnel.length;
  const regular=personnel.filter(p=>!p.emp_type||p.emp_type==="정규직").length;
  const irregular=personnel.filter(p=>p.emp_type==="비정규직").length;
  const headOffice=personnel.filter(p=>p.dept_type==="본사").length;
  const siteStaff=personnel.filter(p=>!p.dept_type||p.dept_type==="현장").length;

  // 직종별 (job_type 기준)
  const JOB_TYPES_ORDER=["건축","기계","전기","안전","품질","관리","토목","기타"];
  const byJobType={};
  personnel.forEach(p=>{const j=p.job_type||"기타";byJobType[j]=(byJobType[j]||0)+1;});

  // 직군별 (자동 매핑)
  const byGroup={};
  ORG_GROUPS.forEach(g=>{byGroup[g.label]=0;});
  personnel.forEach(p=>{const g=mapJobTypeToRoleGroup(p.job_type,p.position);byGroup[g]=(byGroup[g]||0)+1;});

  // 직위별 (POSITION_SORT 기준 정렬)
  const byPos={};
  personnel.forEach(p=>{const pos=p.position||"미지정";byPos[pos]=(byPos[pos]||0)+1;});
  const sortedPos=Object.entries(byPos).sort((a,b)=>{
    const ia=positionSortKey(a[0]); const ib=positionSortKey(b[0]);
    return ia-ib;
  });

  // 사원구분별
  const empTypes=[["정규직",regular,"#6C63FF","#EDE9FE"],["비정규직",irregular,"#F59E0B","#FEF3C7"]];

  // ── 현장별 배치 인원 (personnel 부서명 기준) ──
  const siteStats=sites.map(s=>{
    // personnel.department === site.name 으로 매핑
    const sPersonnel=personnel.filter(p=>p.department===s.name);
    const byGrp={};
    ORG_GROUPS.forEach(g=>{byGrp[g.label]=0;});
    sPersonnel.forEach(p=>{const g=mapJobTypeToRoleGroup(p.job_type,p.position);byGrp[g]=(byGrp[g]||0)+1;});
    const reg2=sPersonnel.filter(p=>!p.emp_type||p.emp_type==="정규직").length;
    const irr2=sPersonnel.filter(p=>p.emp_type==="비정규직").length;
    // 인력 부족 체크 — siteMinStaff DB 기준, 없으면 기본값
    const siteMinMap={};
    siteMinStaff.filter(m=>m.site_id===s.id).forEach(m=>{siteMinMap[m.role_group]=parseInt(m.min_count)||0;});
    const defaultMin={"공사":3,"안전":1,"품질":1,"관리":1};
    const minMap=Object.keys(siteMinMap).length>0?siteMinMap:defaultMin;
    const shortage=Object.entries(minMap).filter(([g,min])=>min>0&&(byGrp[g]||0)<min).map(([g,min])=>({group:g,current:byGrp[g]||0,min}));
    return {site:s,total:sPersonnel.length,regular:reg2,irregular:irr2,byGrp,shortage};
  }).sort((a,b)=>b.total-a.total);

  const totalShortage=siteStats.filter(s=>s.shortage.length>0).length;

  const cardStyle={background:"#fff",borderRadius:14,padding:"20px 22px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #EEF2F7"};
  const SEC=({title,accent,children,extra})=><div style={cardStyle}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <p style={{margin:0,fontSize:13,fontWeight:800,color:"#2D3748",display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:4,height:16,background:accent,borderRadius:2,display:"inline-block"}}/>
        {title}
      </p>
      {extra}
    </div>
    {children}
  </div>;

  return <div style={{display:"flex",flexDirection:"column",gap:20}}>
    {/* 인력 부족 경고 배너 */}
    {totalShortage>0&&<div style={{background:"linear-gradient(90deg,rgba(248,113,113,0.08),rgba(239,68,68,0.04))",border:"1px solid #FCA5A5",borderRadius:14,padding:"14px 20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <span style={{fontSize:18}}>⚠️</span>
        <h3 style={{margin:0,fontSize:14,fontWeight:800,color:"#DC2626"}}>인력 부족 현장 {totalShortage}개소 — 즉시 확인 필요</h3>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {siteStats.filter(s=>s.shortage.length>0).map(({site,shortage})=>
          shortage.map(sh=><div key={site.id+sh.group} style={{background:"#fff",borderRadius:8,padding:"8px 14px",border:"1px solid #FCA5A5",borderLeft:"4px solid #EF4444",fontSize:12,color:"#374151"}}>
            <strong style={{color:"#DC2626"}}>{site.name}</strong> — {sh.group} 직군 인원 부족
            <span style={{marginLeft:8,color:"#EF4444",fontWeight:700}}>(현재 {sh.current}명 / 최소 {sh.min}명)</span>
          </div>)
        )}
      </div>
    </div>}

    {/* KPI 카드 */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12}}>
      {[
        {label:"총 등록 인원",val:total,unit:"명",color:"#6C63FF",bg:"#EDE9FE",icon:"👥"},
        {label:"정규직",val:regular,unit:"명",color:"#22C55E",bg:"#F0FDF4",icon:"🏷"},
        {label:"비정규직",val:irregular,unit:"명",color:"#F59E0B",bg:"#FEF3C7",icon:"📋"},
        {label:"본사 인원",val:headOffice,unit:"명",color:"#6366F1",bg:"#EEF2FF",icon:"🏢"},
        {label:"현장 인원",val:siteStaff,unit:"명",color:"#0EA5E9",bg:"#F0F9FF",icon:"🏗"},
        {label:"인력부족 현장",val:totalShortage,unit:"개소",color:totalShortage>0?"#DC2626":"#6B7280",bg:totalShortage>0?"#FEF2F2":"#F9FAFB",icon:"⚠️"},
      ].map(k=><div key={k.label} style={{...cardStyle,background:k.bg,border:"none",display:"flex",alignItems:"center",gap:12,padding:"16px 18px"}}>
        <div style={{fontSize:26}}>{k.icon}</div>
        <div>
          <p style={{margin:0,fontSize:10,color:k.color,fontWeight:700}}>{k.label}</p>
          <p style={{margin:"2px 0 0",fontSize:24,fontWeight:800,color:k.color}}>{k.val}<span style={{fontSize:12,fontWeight:600}}> {k.unit}</span></p>
        </div>
      </div>)}
    </div>

    {/* 직종별 + 직군별 */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <SEC title="직종별 인원 현황" accent="#3B82F6">
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {JOB_TYPES_ORDER.filter(j=>byJobType[j]>0).map(j=>{
            const cnt=byJobType[j]; const pct=total?Math.round(cnt/total*100):0;
            const gc=getGroupColor(mapJobTypeToRoleGroup(j,""));
            return <div key={j}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,fontWeight:700,color:gc}}>{j}</span>
                <span style={{fontSize:12,fontWeight:800,color:"#2D3748"}}>{cnt}명 <span style={{fontSize:10,color:"#A0AEC0"}}>({pct}%)</span></span>
              </div>
              <div style={{height:7,borderRadius:4,background:"#EEF2F7",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:gc,borderRadius:4}}/>
              </div>
            </div>;
          })}
          {Object.values(byJobType).every(v=>v===0)&&<p style={{textAlign:"center",color:"#A0AEC0",fontSize:13}}>데이터 없음</p>}
        </div>
      </SEC>

      <SEC title="직군별 인원 현황" accent="#6C63FF">
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {ORG_GROUPS.filter(g=>byGroup[g.label]>0).map(g=>{
            const cnt=byGroup[g.label]; const pct=total?Math.round(cnt/total*100):0;
            return <div key={g.label}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,fontWeight:700,color:g.color}}>{g.label}</span>
                <span style={{fontSize:12,fontWeight:800,color:"#2D3748"}}>{cnt}명 <span style={{fontSize:10,color:"#A0AEC0"}}>({pct}%)</span></span>
              </div>
              <div style={{height:7,borderRadius:4,background:"#EEF2F7",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:g.color,borderRadius:4}}/>
              </div>
            </div>;
          })}
          {total===0&&<p style={{textAlign:"center",color:"#A0AEC0",fontSize:13}}>데이터 없음</p>}
        </div>
      </SEC>
    </div>

    {/* 직위별 + 사원구분 */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <SEC title="직위별 인원 현황" accent="#0EA5E9">
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {sortedPos.map(([pos,cnt])=>{
            const pct=total?Math.round(cnt/total*100):0;
            return <div key={pos} style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:12,color:"#4A5568",fontWeight:600,width:72,flexShrink:0}}>{pos}</span>
              <div style={{flex:1,height:7,borderRadius:4,background:"#EEF2F7",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:"#6C63FF",borderRadius:4}}/>
              </div>
              <span style={{fontSize:12,fontWeight:800,color:"#6C63FF",minWidth:32,textAlign:"right"}}>{cnt}명</span>
            </div>;
          })}
          {sortedPos.length===0&&<p style={{textAlign:"center",color:"#A0AEC0",fontSize:13}}>데이터 없음</p>}
        </div>
      </SEC>
      <SEC title="사원구분 현황" accent="#22C55E">
        <div style={{display:"flex",gap:12,marginBottom:16}}>
          {empTypes.map(([label,cnt,color,bg])=><div key={label} style={{flex:1,background:bg,borderRadius:10,padding:"14px 16px",textAlign:"center"}}>
            <p style={{margin:0,fontSize:11,fontWeight:700,color}}>{label}</p>
            <p style={{margin:"6px 0 0",fontSize:28,fontWeight:800,color}}>{cnt}<span style={{fontSize:13}}> 명</span></p>
            <p style={{margin:"4px 0 0",fontSize:11,color,opacity:0.8}}>{total?Math.round(cnt/total*100):0}%</p>
          </div>)}
        </div>
        <div style={{display:"flex",gap:10}}>
          {[["본사",headOffice,"#6366F1","#EEF2FF"],["현장",siteStaff,"#0EA5E9","#F0F9FF"]].map(([label,cnt,color,bg])=><div key={label} style={{flex:1,background:bg,borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
            <p style={{margin:0,fontSize:10,fontWeight:700,color}}>{label}</p>
            <p style={{margin:"4px 0 0",fontSize:20,fontWeight:800,color}}>{cnt}<span style={{fontSize:11}}> 명</span></p>
          </div>)}
        </div>
      </SEC>
    </div>

    {/* 현장별 인원현황 */}
    <SEC title="현장별 배치 인원 현황 (인원 DB 부서명 기준)" accent="#F59E0B">
      {siteStats.every(s=>s.total===0)
        ?<p style={{textAlign:"center",color:"#A0AEC0",fontSize:13}}>배치된 인원이 없습니다. 인원의 부서명을 현장명과 동일하게 입력하세요.</p>
        :<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {siteStats.filter(s=>s.total>0).map(({site,total:tot,regular:r,irregular:ir,byGrp,shortage})=><div key={site.id}
            style={{border:`1px solid ${shortage.length>0?"#FCA5A5":"#EEF2F7"}`,borderRadius:12,padding:"14px 16px",background:shortage.length>0?"#FFF5F5":"#FAFAFA"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <p style={{margin:0,fontSize:13,fontWeight:800,color:"#1A1A2E",display:"flex",alignItems:"center",gap:6}}>
                  {site.name}
                  {shortage.length>0&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:"#EF4444",color:"#fff",fontWeight:700}}>인력부족</span>}
                </p>
                <p style={{margin:"2px 0 0",fontSize:11,color:"#718096"}}>{site.pm&&`PM: ${site.pm}`} {site.location&&`· ${site.location}`}</p>
              </div>
              <div style={{textAlign:"right"}}>
                <p style={{margin:0,fontSize:22,fontWeight:800,color:"#6C63FF"}}>{tot}<span style={{fontSize:12}}> 명</span></p>
                <p style={{margin:0,fontSize:10,color:"#718096"}}>정규 {r} · 비정규 {ir}</p>
              </div>
            </div>
            <div style={{display:"flex",gap:3,height:8,borderRadius:4,overflow:"hidden",marginBottom:7}}>
              {ORG_GROUPS.filter(g=>byGrp[g.label]>0).map(g=><div key={g.label}
                title={`${g.label}: ${byGrp[g.label]}명`}
                style={{flex:byGrp[g.label],background:g.color}}/>)}
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {ORG_GROUPS.filter(g=>byGrp[g.label]>0).map(g=><span key={g.label}
                style={{fontSize:10,padding:"1px 7px",borderRadius:4,background:g.color+"22",color:g.color,fontWeight:700}}>{g.label} {byGrp[g.label]}</span>)}
            </div>
            {shortage.length>0&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:3}}>
              {shortage.map(sh=><p key={sh.group} style={{margin:0,fontSize:10,color:"#EF4444",fontWeight:600}}>
                ⚠ {sh.group} 직군 인원 부족 (현재 {sh.current}명 / 최소 {sh.min}명)
              </p>)}
            </div>}
          </div>)}
        </div>
      }
    </SEC>
  </div>;
}

function Reports({schedules,tasks}){
  const total=tasks.length;
  const donePct=total?Math.round(tasks.filter(t=>t.status==="완료").length/total*100):0;
  const avgProg=total?Math.round(tasks.reduce((a,t)=>a+Number(t.progress),0)/total):0;
  const pc={high:0,medium:0,low:0};
  schedules.forEach(s=>{if(pc[s.priority]!==undefined)pc[s.priority]++;});
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
    <SecCard title="일정 우선순위 분포" accent="#6C63FF">{Object.entries(pc).map(([p,c])=>{const col=PRIORITY_COLORS[p];const pct=schedules.length?Math.round(c/schedules.length*100):0;return <div key={p} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:col.bg,fontWeight:600}}>{p==="high"?"높음":p==="medium"?"중간":"낮음"}</span><span style={{fontSize:12,color:"#718096"}}>{c}개 ({pct}%)</span></div><div style={{height:8,background:"#CBD5E0",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:col.bg,borderRadius:4}}/></div></div>;})}</SecCard>
    <SecCard title="업무 완료율" accent="#4ADE80">
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:140}}>
        <div style={{position:"relative",width:130,height:130}}>
          <svg width="130" height="130" viewBox="0 0 130 130"><circle cx="65" cy="65" r="55" fill="none" stroke="#CBD5E0" strokeWidth="12"/><circle cx="65" cy="65" r="55" fill="none" stroke="#4ADE80" strokeWidth="12" strokeDasharray={`${2*Math.PI*55*donePct/100} ${2*Math.PI*55}`} strokeLinecap="round" transform="rotate(-90 65 65)"/></svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:26,fontWeight:800,color:"#4ADE80"}}>{donePct}%</span><span style={{fontSize:11,color:"#718096"}}>완료</span></div>
        </div>
      </div>
      <p style={{textAlign:"center",color:"#4A5568",fontSize:13,margin:0}}>평균 진행률: <strong style={{color:"#2D3748"}}>{avgProg}%</strong></p>
    </SecCard>
    <SecCard title="업무 현황 요약" accent="#F9A8D4">{TASK_STATUSES.map(st=>{const count=tasks.filter(t=>t.status===st).length;const c=STATUS_COLORS[st];return <div key={st} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #EEF2F7"}}><span style={{fontSize:13,color:c.text}}>{st}</span><span style={{fontSize:13,fontWeight:700}}>{count}개</span></div>;})}</SecCard>
    <SecCard title="전체 통계" accent="#FB923C">{[["총 일정",schedules.length,"#6C63FF"],["총 업무",tasks.length,"#2EC4B6"],["완료된 업무",tasks.filter(t=>t.status==="완료").length,"#4ADE80"],["고우선 일정",pc.high,"#FF4D6D"]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #EEF2F7"}}><span style={{fontSize:13,color:"#4A5568"}}>{l}</span><span style={{fontSize:16,fontWeight:800,color:c}}>{v}</span></div>)}</SecCard>
  </div>;
}

// ── 모달 공통 ─────────────────────────────────────────
function ModalWrap({title,children,onClose,onSave}){
  const mobileModal=window.innerWidth<=767;
  return <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.45)",display:"flex",alignItems:mobileModal?"flex-end":"center",justifyContent:"center",zIndex:100,padding:mobileModal?0:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:"#FFFFFF",border:"1px solid #CBD5E0",borderRadius:mobileModal?"20px 20px 0 0":16,width:"100%",maxWidth:mobileModal?"100%":480,padding:mobileModal?"20px 16px 32px":"24px 28px",maxHeight:mobileModal?"92vh":"90vh",overflow:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#6C63FF"}}>{title}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#718096",cursor:"pointer",fontSize:22}}>×</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>{children}</div>
      <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={btn("#CBD5E0","#4A5568")}>취소</button>
        <button onClick={onSave} style={btn("#6C63FF")}>저장</button>
      </div>
    </div>
  </div>;
}
function Fld({label,children}){return <div><label style={{display:"block",fontSize:12,fontWeight:600,color:"#4A5568",marginBottom:6}}>{label}</label>{children}</div>;}

function SchedModal({initial,onSave,onClose,isEdit,modalTitle}){
  const [f,setF]=useState({...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const typeLabel=modalTitle||"일정";
  const isTrip=modalTitle==="출장일정";
  const selPc=PART_COLORS[f.part];
  return <ModalWrap title={isEdit?`${typeLabel} 수정`:`새 ${typeLabel} 추가`} onClose={onClose} onSave={()=>{if(!f.title?.trim()||!f.owner_name?.trim()){alert("제목과 담당자를 입력하세요.");return;}onSave(f);}}>
    <Fld label="일정 제목 *"><input value={f.title||""} onChange={e=>s("title",e.target.value)} placeholder="일정 제목을 입력하세요" style={inp}/></Fld>
    <Fld label="설명"><textarea value={f.description||""} onChange={e=>s("description",e.target.value)} rows={3} placeholder="일정 설명 (선택)" style={{...inp,resize:"vertical"}}/></Fld>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="담당자 이름 *"><input value={f.owner_name||""} onChange={e=>s("owner_name",e.target.value)} placeholder="담당자 이름" style={inp}/></Fld>
      <Fld label="이메일 (알림 수신용)"><input type="email" value={f.owner_email||""} onChange={e=>s("owner_email",e.target.value)} placeholder="example@email.com" style={inp}/></Fld>
    </div>
    {isTrip&&<Fld label="파트">
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {TRIP_PARTS.map(p=>{const pc=PART_COLORS[p];const sel=f.part===p;return <button key={p} type="button" onClick={()=>s("part",sel?"":p)}
          style={{padding:"6px 14px",borderRadius:20,border:`2px solid ${sel?pc.badge:pc.border}`,background:sel?pc.badge:pc.bg,color:sel?"#fff":pc.text,fontWeight:700,fontSize:12,cursor:"pointer",transition:"all 0.15s"}}>{p}</button>;})}
      </div>
      {f.part&&selPc&&<div style={{marginTop:8,display:"inline-flex",alignItems:"center",gap:6,background:selPc.bg,border:`1px solid ${selPc.border}`,borderRadius:8,padding:"4px 12px"}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:selPc.badge,display:"inline-block"}}/>
        <span style={{fontSize:12,color:selPc.text,fontWeight:700}}>{f.part} 선택됨</span>
      </div>}
    </Fld>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="시작일"><input type="date" value={f.start_date||""} onChange={e=>{const v=e.target.value;setF(p=>({...p,start_date:v,end_date:(!p.end_date||v>p.end_date)?v:p.end_date}));}} style={inp}/></Fld>
      <Fld label="시작 시간"><input type="time" value={f.start_time||""} onChange={e=>s("start_time",e.target.value)} style={inp}/></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="종료일"><input type="date" value={f.end_date||""} onChange={e=>s("end_date",e.target.value)} style={inp}/></Fld>
      <Fld label="종료 시간"><input type="time" value={f.end_time||""} onChange={e=>s("end_time",e.target.value)} style={inp}/></Fld>
    </div>
    <Fld label="중요도"><select value={f.priority||"medium"} onChange={e=>s("priority",e.target.value)} style={inp}><option value="high">높음</option><option value="medium">중간</option><option value="low">낮음</option></select></Fld>
  </ModalWrap>;
}

function TaskModal_({initial,onSave,onClose,isEdit}){
  const [f,setF]=useState({...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <ModalWrap title={isEdit?"업무 수정":"새 업무 추가"} onClose={onClose} onSave={()=>{if(!f.title?.trim()||!f.owner_name?.trim()){alert("제목과 담당자를 입력하세요.");return;}onSave(f);}}>
    <Fld label="업무 제목 *"><input value={f.title||""} onChange={e=>s("title",e.target.value)} placeholder="업무 제목을 입력하세요" style={inp}/></Fld>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="담당자 이름 *"><input value={f.owner_name||""} onChange={e=>s("owner_name",e.target.value)} placeholder="담당자 이름" style={inp}/></Fld>
      <Fld label="파트"><select value={f.part||""} onChange={e=>s("part",e.target.value)} style={inp}><option value="">파트 선택</option>{PARTS.map(p=><option key={p} value={p}>{p}</option>)}</select></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="시작일"><input type="date" value={f.start_date||""} onChange={e=>{const v=e.target.value;setF(p=>({...p,start_date:v,end_date:(!p.end_date||v>p.end_date)?v:p.end_date}));}} style={inp}/></Fld>
      <Fld label="완료 예정일"><input type="date" value={f.due_date||""} onChange={e=>s("due_date",e.target.value)} style={inp}/></Fld>
    </div>
    <Fld label={`진행률: ${f.progress||0}%`}><input type="range" min={0} max={100} value={f.progress||0} onChange={e=>s("progress",Number(e.target.value))} style={{width:"100%",accentColor:"#6C63FF"}}/></Fld>
    <Fld label="상태"><select value={f.status||"할 일"} onChange={e=>s("status",e.target.value)} style={inp}>{TASK_STATUSES.map(x=><option key={x} value={x}>{x}</option>)}</select></Fld>
  </ModalWrap>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
