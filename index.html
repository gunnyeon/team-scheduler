<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── API 설정 ───────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbx1NCMAD_PyppWDyVc_9TPCcfJ_0BV__7s8ie3AuXWUAtLDiT88CH9DNie59xM3XkEUBA/exec";
const SCHED_HEADERS = ["id","title","description","owner_name","owner_email","start_date","start_time","end_date","end_time","priority"];
const TASK_HEADERS  = ["id","title","owner_name","part","start_date","due_date","progress","status"];
const TRIP_HEADERS  = ["id","title","description","owner_name","owner_email","start_date","start_time","end_date","end_time","priority"];
const LEAVE_HEADERS = ["id","title","description","owner_name","owner_email","start_date","start_time","end_date","end_time","priority"];

async function apiGet(sheet){
  const r=await fetch(`${API_URL}?sheet=${sheet}`);
  const d=await r.json();
  if(!d.ok)return[];
  // Sheets에서 날짜가 Date 객체 문자열로 올 경우 yyyy-MM-dd 형식으로 정규화
  return (d.data||[]).map(row=>{
    const normalized={...row};
    ["start_date","end_date","due_date"].forEach(key=>{
      if(normalized[key]){
        const v=String(normalized[key]);
        // Date 객체 문자열이면 파싱해서 yyyy-MM-dd로 변환
        if(v.includes("T")||v.includes("/")||(!v.match(/^\d{4}-\d{2}-\d{2}$/)&&v.length>0)){
          const dt=new Date(v);
          if(!isNaN(dt)){
            const yy=dt.getFullYear();
            const mm=String(dt.getMonth()+1).padStart(2,"0");
            const dd=String(dt.getDate()).padStart(2,"0");
            normalized[key]=`${yy}-${mm}-${dd}`;
          }
        }
      }
    });
    ["start_time","end_time"].forEach(key=>{
      if(normalized[key]){
        const v=String(normalized[key]);
        // HH:MM 형식이 아니면 정규화
        if(v.includes("T")){
          const dt=new Date(v);
          if(!isNaN(dt)){
            normalized[key]=`${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
          }
        }
      }
    });
    return normalized;
  });
}
async function apiPost(payload){
  const params=new URLSearchParams({payload:JSON.stringify(payload)});
  await fetch(`${API_URL}?${params}`);
}
async function apiInit(sheet,headers){await apiPost({sheet,action:"init",headers});}
async function apiUpsert(sheet,row){await apiPost({sheet,action:"upsert",row});}
async function apiDelete(sheet,id){await apiPost({sheet,action:"delete",id});}

// ── 상수 ──────────────────────────────────────────────
const AVATAR_COLORS=["#6C63FF","#FF6B9D","#2EC4B6","#FB923C","#4ADE80","#F9A8D4","#60A5FA","#FBBF24"];
function getAvatarColor(name){let h=0;for(let c of(name||"?"))h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;return AVATAR_COLORS[h];}
function getLocalDateStr(date){
  // toISOString()은 UTC 기준이라 한국(UTC+9) 자정 이후 날짜가 달라짐
  // 로컬 시간 기준으로 yyyy-MM-dd 반환
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function getDayOfWeek(dateStr){
  if(!dateStr)return"";
  const days=["일","월","화","수","목","금","토"];
  const d=new Date(dateStr+"T00:00:00");
  return isNaN(d)?"":days[d.getDay()];
}

const PRIORITY_COLORS={high:{bg:"#FF4D6D",text:"#fff"},medium:{bg:"#FF9F1C",text:"#fff"},low:{bg:"#2EC4B6",text:"#fff"}};
const TASK_STATUSES=["할 일","진행 중","검토","완료"];
const STATUS_COLORS={"할 일":{bg:"#EEF2FF",border:"#818CF8",text:"#4338CA"},"진행 중":{bg:"#FFF7ED",border:"#FB923C",text:"#C2410C"},"검토":{bg:"#FDF4FF",border:"#C084FC",text:"#7E22CE"},"완료":{bg:"#F0FDF4",border:"#4ADE80",text:"#15803D"}};
const PARTS=["PM파트","기획파트","SUB파트","BS파트","공정파트","안전파트","설계파트"];
const PART_COLORS={"PM파트":{bg:"#EDE9FE",border:"#818CF8",text:"#4338CA"},"기획파트":{bg:"#DBEAFE",border:"#60A5FA",text:"#1D4ED8"},"SUB파트":{bg:"#DCFCE7",border:"#4ADE80",text:"#15803D"},"BS파트":{bg:"#FAE8FF",border:"#C084FC",text:"#7E22CE"},"공정파트":{bg:"#FFF7ED",border:"#FB923C",text:"#C2410C"},"안전파트":{bg:"#FEF2F2",border:"#F87171",text:"#DC2626"},"설계파트":{bg:"#F3E8FF",border:"#C084FC",text:"#6D28D9"}};
const HOLIDAYS={"01-01":"신정","03-01":"삼일절","05-05":"어린이날","06-06":"현충일","08-15":"광복절","10-03":"개천절","10-09":"한글날","12-25":"성탄절","2025-01-28":"설날 연휴","2025-01-29":"설날","2025-01-30":"설날 연휴","2025-05-05":"어린이날/부처님오신날","2025-10-05":"추석 연휴","2025-10-06":"추석","2025-10-07":"추석 연휴","2026-02-16":"설날 연휴","2026-02-17":"설날","2026-02-18":"설날 연휴","2026-05-24":"부처님오신날","2026-09-24":"추석 연휴","2026-09-25":"추석","2026-09-26":"추석 연휴"};
function getHoliday(ds){return HOLIDAYS[ds]||HOLIDAYS[ds.slice(5)]||null;}
// 전역 정렬 함수 (Dashboard 등 여러 컴포넌트에서 사용)
function sortTasks(arr){return[...arr].sort((a,b)=>{const d=(a.start_date||"9999").localeCompare(b.start_date||"9999");return d!==0?d:(a.due_date||"9999").localeCompare(b.due_date||"9999");});}
function sortSched(arr){return[...arr].sort((a,b)=>{const d=a.start_date.localeCompare(b.start_date);return d!==0?d:(a.start_time||"00:00").localeCompare(b.start_time||"00:00");});}

const btn=(bg,color="#fff")=>({background:bg,color,border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"});
const inp={width:"100%",background:"#fff",border:"1px solid #CBD5E0",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#2D3748",outline:"none",boxSizing:"border-box"};

function useWindowSize(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);
  return w;
}

// ── 메인 앱 ───────────────────────────────────────────
function App(){
  const winW=useWindowSize();
  const isMobile=winW<=767;
  const isTablet=winW>767&&winW<=1024;
  const [myName,setMyName]=useState(()=>{try{return sessionStorage.getItem("ts-name")||"";}catch{return "";}});
  const [nameInput,setNameInput]=useState("");
  const [activeMenu,setActiveMenu]=useState("대시보드");
  const [schedules,setSchedules]=useState([]);
  const [trips,setTrips]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [syncStatus,setSyncStatus]=useState("동기화됨");
  const [lastSync,setLastSync]=useState(new Date());
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [showSchedModal,setShowSchedModal]=useState(false);
  const [showTaskModal,setShowTaskModal]=useState(false);
  const [showTripModal,setShowTripModal]=useState(false);
  const [editingSched,setEditingSched]=useState(null);
  const [editingTask,setEditingTask]=useState(null);
  const [editingTrip,setEditingTrip]=useState(null);
  const [confirmDlg,setConfirmDlg]=useState(null);
  const [currentMonth,setCurrentMonth]=useState(new Date());
  const [selectedSched,setSelectedSched]=useState(null);
  const initialized=useRef(false);
  const polling=useRef(null);
  const [appLoading,setAppLoading]=useState(false);
  const [currentMonth2,setCurrentMonth2]=useState(new Date());
  const [selectedSched2,setSelectedSched2]=useState(null);
  const [leaves,setLeaves]=useState([]);
  const [currentMonth3,setCurrentMonth3]=useState(new Date());
  const [selectedSched3,setSelectedSched3]=useState(null);
  const [showLeaveModal,setShowLeaveModal]=useState(false);
  const [editingLeave,setEditingLeave]=useState(null);

  const todayStr=getLocalDateStr(new Date());
  const weekEndDate=new Date(); weekEndDate.setDate(weekEndDate.getDate()+6);
  const weekEndStr=getLocalDateStr(weekEndDate);

  const lastLocalChange=useRef(0); // 마지막 로컬 변경 시각 (ms)

  async function initialize(){
    if(initialized.current)return;
    setAppLoading(true);
    try{
      setSyncStatus("연결 중");
      // apiInit은 백그라운드 (시트 생성은 오래 걸릴 수 있음)
      Promise.all([apiInit("schedules",SCHED_HEADERS),apiInit("trips",TRIP_HEADERS),apiInit("tasks",TASK_HEADERS),apiInit("leaves",LEAVE_HEADERS)]).catch(()=>{});
      await loadData();
      initialized.current=true;
    }catch(e){
      setSyncStatus("오류");
      initialized.current=true;
    }
    setAppLoading(false);
  }

  async function loadData(){
    const reqAt=Date.now();
    try{
      const [s,tr,t,lv]=await Promise.all([apiGet("schedules"),apiGet("trips"),apiGet("tasks"),apiGet("leaves")]);
      // 요청 시작 후 로컬 변경이 있으면 무시 (내가 방금 저장한 데이터를 서버가 덮어쓰지 않도록)
      if(lastLocalChange.current>reqAt)return;
      // JSON 문자열 비교로 실제 변경 시에만 setState → 불필요한 리렌더 방지
      setSchedules(prev=>{const next=JSON.stringify(s);return JSON.stringify(prev)===next?prev:s;});
      setTrips(prev=>{const next=JSON.stringify(tr);return JSON.stringify(prev)===next?prev:tr;});
      setTasks(prev=>{const next=JSON.stringify(t);return JSON.stringify(prev)===next?prev:t;});
      setLeaves(prev=>{const next=JSON.stringify(lv);return JSON.stringify(prev)===next?prev:lv;});
      setLastSync(new Date()); setSyncStatus("동기화됨");
    }catch(e){setSyncStatus("오류");}
  }

  // 로컬 변경 시 버전 올림 → 진행 중인 폴링 응답을 무효화
  function bumpLocal(){ lastLocalChange.current=Date.now(); setSyncStatus("저장중"); }
  function afterSave(){
    // 저장 직후 1.5초간 폴링 응답 무시 (충돌 방지)
    lastLocalChange.current=Date.now()+1500;
    setSyncStatus("동기화됨");
    // 폴링 리셋 후 2초 뒤 1회 로드 (저장 완료 후 서버 반영 시간 확보)
    clearInterval(polling.current);
    setTimeout(()=>{
      loadData();
      polling.current=setInterval(loadData,3000);
    },800);
  }

  useEffect(()=>{
    if(!myName)return;
    if(initialized.current){
      // 로그인 시 이미 데이터 로드됨 → 로딩화면 없이 바로 시작
      setAppLoading(false);
      polling.current=setInterval(loadData,3000);
    } else {
      initialize().then(()=>{
        polling.current=setInterval(loadData,3000);
      });
    }
    return()=>clearInterval(polling.current);
  },[myName]);

  const todaySchedules  =sortSched(schedules.filter(s=>s.start_date<=todayStr&&s.end_date>=todayStr));
  const weekSchedules   =sortSched(schedules.filter(s=>s.start_date<=weekEndStr&&s.end_date>=todayStr));
  const urgentSchedules =sortSched(schedules.filter(s=>s.end_date>=todayStr&&s.end_date<=weekEndStr));
  const weekTrips       =sortSched((trips||[]).filter(s=>s.start_date<=weekEndStr&&s.end_date>=todayStr));
  const inProgressTasks =sortTasks(tasks.filter(t=>t.status==="진행 중"));
  const overdueTasks    =tasks.filter(t=>t.due_date&&t.due_date<todayStr&&t.status!=="완료").sort((a,b)=>a.due_date.localeCompare(b.due_date));

  const menus=["대시보드","캘린더(주요일정)","캘린더(출장일정)","캘린더(연차일정)","일정 관리","업무 관리","현장별PM","리포트"];
  const menuIcons={"대시보드":"▦","캘린더(주요일정)":"🗓","캘린더(출장일정)":"✈️","캘린더(연차일정)":"🌴","일정 관리":"📅","업무 관리":"✓","현장별PM":"🏗","리포트":"📊"};
  const newSchedDef={title:"",description:"",owner_name:myName||"",owner_email:"",start_date:todayStr,start_time:"09:00",end_date:todayStr,end_time:"18:00",priority:"medium"};
  const newTripDef={title:"",description:"",owner_name:myName||"",owner_email:"",start_date:todayStr,start_time:"09:00",end_date:todayStr,end_time:"18:00",priority:"medium"};
  const newTaskDef={title:"",owner_name:myName||"",part:"",start_date:todayStr,due_date:"",progress:0,status:"할 일"};
  const newLeaveDef={title:"연차",description:"",owner_name:myName||"",owner_email:"",start_date:todayStr,start_time:"09:00",end_date:todayStr,end_time:"18:00",priority:"low"};

  async function saveSched(data){
    const isEdit=!!data.id;
    const row={...data,id:data.id||`s${Date.now()}`};
    const updated=isEdit?schedules.map(s=>s.id===row.id?row:s):[...schedules,row];
    setSchedules(updated);       // 로컬 즉시 반영
    setShowSchedModal(false);    // 모달 즉시 닫기
    setEditingSched(null);
    bumpLocal();
    apiUpsert("schedules",row).then(()=>afterSave()).catch(()=>{setSyncStatus("오류");});
  }
  function saveTrip(data){
    const isEdit=!!data.id;
    const row={...data,id:data.id||`tr${Date.now()}`};
    const updated=isEdit?trips.map(s=>s.id===row.id?row:s):[...trips,row];
    setTrips(updated);
    setShowTripModal(false);
    setEditingTrip(null);
    bumpLocal();
    apiUpsert("trips",row).then(()=>afterSave()).catch(()=>{setSyncStatus("오류");});
  }
  async function deleteTrip(id){
    const target=trips.find(s=>s.id===id);
    setConfirmDlg({message:`"${target?.title}" 출장일정을 삭제하시겠습니까?`,onConfirm:()=>{
      setTrips(trips.filter(s=>s.id!==id));
      setConfirmDlg(null);
      bumpLocal();
      apiDelete("trips",id).then(()=>afterSave()).catch(()=>{setSyncStatus("오류");});
    }});
  }
  function saveLeave(data){
    const isEdit=!!data.id;
    const row={...data,id:data.id||`lv${Date.now()}`};
    const updated=isEdit?leaves.map(s=>s.id===row.id?row:s):[...leaves,row];
    setLeaves(updated);
    setShowLeaveModal(false);
    setEditingLeave(null);
    bumpLocal();
    apiUpsert("leaves",row).then(()=>afterSave()).catch(()=>{setSyncStatus("오류");});
  }
  async function deleteLeave(id){
    const target=leaves.find(s=>s.id===id);
    setConfirmDlg({message:`"${target?.title}" 연차일정을 삭제하시겠습니까?`,onConfirm:()=>{
      setLeaves(leaves.filter(s=>s.id!==id));
      setConfirmDlg(null);
      bumpLocal();
      apiDelete("leaves",id).then(()=>afterSave()).catch(()=>{setSyncStatus("오류");});
    }});
  }
  async function deleteSched(id){
    const target=schedules.find(s=>s.id===id);
    setConfirmDlg({message:`"${target?.title}" 일정을 삭제하시겠습니까?`,onConfirm:()=>{
      setSchedules(schedules.filter(s=>s.id!==id)); // 로컬 즉시 반영
      setConfirmDlg(null);
      bumpLocal();
      apiDelete("schedules",id).then(()=>afterSave()).catch(()=>{setSyncStatus("오류");});
    }});
  }
  function saveTask(data){
    const isEdit=!!data.id;
    const row={...data,id:data.id||`t${Date.now()}`};
    const updated=isEdit?tasks.map(t=>t.id===row.id?row:t):[...tasks,row];
    setTasks(updated);
    setShowTaskModal(false);
    setEditingTask(null);
    bumpLocal();
    apiUpsert("tasks",row).then(()=>afterSave()).catch(()=>{setSyncStatus("오류");});
  }
  async function deleteTask(id){
    const target=tasks.find(t=>t.id===id);
    setConfirmDlg({message:`"${target?.title}" 업무를 삭제하시겠습니까?`,onConfirm:()=>{
      setTasks(tasks.filter(t=>t.id!==id)); // 로컬 즉시 반영
      setConfirmDlg(null);
      bumpLocal();
      apiDelete("tasks",id).then(()=>afterSave()).catch(()=>{setSyncStatus("오류");});
    }});
  }
  async function updateTaskStatus(id,status){
    const task=tasks.find(t=>t.id===id);
    if(!task)return;
    const row={...task,status};
    const updated=tasks.map(t=>t.id===id?row:t);
    setTasks(updated);
    bumpLocal();
    apiUpsert("tasks",row).then(()=>afterSave()).catch(()=>{setSyncStatus("오류");});
  }

  const [loginError,setLoginError]=useState("");
  const [loginLoading,setLoginLoading]=useState(false);

  async function handleLogin(){
    const n=nameInput.trim();
    if(!n)return;
    setLoginLoading(true);
    setLoginError("");
    try{
      if(API_URL==="YOUR_APPS_SCRIPT_URL_HERE"){
        setLoginError("⚠️ API URL이 설정되지 않았습니다. index.html의 API_URL을 확인하세요.");
        setLoginLoading(false);return;
      }
      // ① members만 먼저 확인 (가장 빠름)
      const membersRes=await fetch(`${API_URL}?sheet=members`);
      const json=await membersRes.json();
      if(!json.ok){
        setLoginError(`⚠️ 서버 오류: ${json.error||"알 수 없는 오류"}`);
        setLoginLoading(false);return;
      }
      const members=json.data||[];
      if(members.length===0){
        setLoginError("⚠️ 허용 목록이 비어있습니다. Sheets members 시트에 이름을 추가하세요.");
        setLoginLoading(false);return;
      }
      const allowed=members.map(m=>String(m.name||"").trim()).filter(Boolean);
      if(!allowed.includes(n)){
        setLoginError("❌ 등록되지 않은 이름입니다. 관리자에게 문의하세요.");
        setLoginLoading(false);return;
      }
      // ② 인증 성공 → 즉시 화면 전환 (데이터는 initialize에서 로드)
      try{sessionStorage.setItem("ts-name",n);}catch{}
      setLoginLoading(false);
      setMyName(n);  // ← 이 시점에 화면이 바뀜, 데이터는 백그라운드 로드
    }catch(e){
      setLoginError(`⚠️ 서버 연결 오류: ${e.message}`);

  if(!myName) return (
    <div style={{height:"100vh",background:"#F4F6FA",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div className="login-box" style={{background:"#FFFFFF",border:"1px solid #E2E8F0",borderRadius:20,padding:"44px 48px",boxShadow:"0 4px 24px rgba(0,0,0,0.10)",width:380,textAlign:"center"}}>
        <div style={{width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,#6C63FF,#FF6B9D)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 20px"}}>🏢</div>
        <h1 style={{margin:"0 0 6px",fontSize:24,fontWeight:800,color:"#6C63FF"}}>TeamSync</h1>
        <p style={{color:"#718096",fontSize:13,margin:"0 0 28px"}}>건축공사팀 일정관리 플랫폼</p>

          style={{width:"100%",background:"#EEF2F7",border:`1px solid ${loginError?"#F8717166":"#6C63FF66"}`,borderRadius:10,padding:"11px 14px",fontSize:15,color:"#2D3748",outline:"none",boxSizing:"border-box",marginBottom:loginError?8:12}}/>
        {loginError&&<p style={{color:"#F87171",fontSize:12,margin:"0 0 12px",textAlign:"left"}}>{loginError}</p>}
        <button onClick={handleLogin} disabled={loginLoading}
          style={{width:"100%",background:loginLoading?"#CBD5E0":"linear-gradient(90deg,#6C63FF,#9C5CF7)",border:"none",borderRadius:10,padding:12,fontSize:14,fontWeight:700,color:loginLoading?"#718096":"#fff",cursor:loginLoading?"not-allowed":"pointer"}}>
          {loginLoading?"확인 중...":"입장하기 →"}

        <p style={{color:"#A0AEC0",fontSize:11,marginTop:16}}>※ 건축공사팀 등록 인원만 입장 가능합니다</p>
      </div>
    </div>
  );

  if(appLoading) return (
    <div style={{height:"100vh",background:"#F4F6FA",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#6C63FF,#FF6B9D)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>🏢</div>
      <p style={{color:"#6C63FF",fontSize:15,fontWeight:700,margin:0}}>TeamSync</p>
      <p style={{color:"#718096",fontSize:13,margin:0}}>데이터를 불러오는 중...</p>
      <div style={{width:200,height:3,background:"#EEF2F7",borderRadius:3,overflow:"hidden",marginTop:8}}>
        <div style={{height:"100%",background:"linear-gradient(90deg,#6C63FF,#FF6B9D)",borderRadius:3,animation:"loading 1.5s ease-in-out infinite"}}/>
      </div>
      <style>{`@keyframes loading{0%{width:0%}50%{width:80%}100%{width:100%}}`}</style>
    </div>
  );

  return (
    <div style={{display:"flex",height:"100vh",background:"#F4F6FA",color:"#2D3748",overflow:"hidden"}}>
      {/* 사이드바 */}
      <div style={{width:isMobile?0:(isTablet||!sidebarOpen)?64:224,transition:"width 0.3s",background:"linear-gradient(180deg,#FFFFFF,#F8FAFC)",borderRight:isMobile?"none":"1px solid #E2E8F0",display:isMobile?"none":"flex",flexDirection:"column",padding:"0 0 16px",flexShrink:0}}>
        <div style={{padding:"20px 16px 24px",borderBottom:"1px solid #EEF2F7",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#6C63FF,#FF6B9D)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🏢</div>
          {(sidebarOpen&&!isTablet)&&<span style={{fontWeight:800,fontSize:15,color:"#6C63FF"}}>TeamSync</span>}
          <div style={{marginLeft:"auto",cursor:"pointer",color:"#718096",fontSize:18}} onClick={()=>setSidebarOpen(v=>!v)}>{sidebarOpen?"◀":"▶"}</div>
        </div>
        <nav style={{padding:"16px 8px",flex:1}}>
          {menus.map(m=>(
            <div key={m} onClick={()=>setActiveMenu(m)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:10,marginBottom:4,cursor:"pointer",background:activeMenu===m?"linear-gradient(90deg,rgba(108,99,255,0.12),rgba(255,107,157,0.1))":"transparent",borderLeft:activeMenu===m?"3px solid #6C63FF":"3px solid transparent",color:activeMenu===m?"#6C63FF":"#4A5568"}}>
              <span style={{fontSize:16,flexShrink:0}}>{menuIcons[m]}</span>
              {(sidebarOpen&&!isTablet)&&<span style={{fontSize:14,fontWeight:activeMenu===m?700:500,whiteSpace:"nowrap"}}>{m}</span>}

        <div style={{padding:"0 12px"}}>
          <div style={{background:"#EEF2F7",borderRadius:10,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>

          </div>
        </div>
      </div>

      {/* 메인 */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div style={{padding:isMobile?"10px 12px":"16px 28px",borderBottom:"1px solid #EEF2F7",background:"#F4F6FA",display:"flex",alignItems:"center",gap:isMobile?8:16,flexShrink:0}}>
          <div style={{flex:1,minWidth:0}}>
            <h1 style={{margin:0,fontSize:isMobile?16:22,fontWeight:800,color:"#1A1A2E",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{activeMenu}</h1>
            {!isMobile&&<p style={{margin:0,fontSize:12,color:"#718096"}}>마지막 동기화: {lastSync.toLocaleTimeString("ko-KR")}</p>}
          </div>
          <div style={{display:"flex",gap:isMobile?6:10,alignItems:"center",flexShrink:0}}>
            {(activeMenu==="일정 관리"||activeMenu==="캘린더(주요일정)")&&<button onClick={()=>{setEditingSched(null);setShowSchedModal(true);}} style={{...btn("#6C63FF"),fontSize:isMobile?11:13,padding:isMobile?"6px 10px":"8px 16px"}}>{isMobile?"+ 추가":"+ 일정 추가"}</button>}
            {activeMenu==="캘린더(출장일정)"&&<button onClick={()=>{setEditingTrip(null);setShowTripModal(true);}} style={{...btn("#FB923C"),fontSize:isMobile?11:13,padding:isMobile?"6px 10px":"8px 16px"}}>{isMobile?"+ 추가":"+ 출장일정 추가"}</button>}
            {activeMenu==="캘린더(연차일정)"&&<button onClick={()=>{setEditingLeave(null);setShowLeaveModal(true);}} style={{...btn("#4ADE80","#15803D"),fontSize:isMobile?11:13,padding:isMobile?"6px 10px":"8px 16px"}}>{isMobile?"+ 추가":"+ 연차 추가"}</button>}
            {activeMenu==="업무 관리"&&<button onClick={()=>{setEditingTask(null);setShowTaskModal(true);}} style={{...btn("#2EC4B6"),fontSize:isMobile?11:13,padding:isMobile?"6px 10px":"8px 16px"}}>{isMobile?"+ 추가":"+ 업무 추가"}</button>}
            <button onClick={loadData} style={{...btn("#CBD5E0","#6C63FF"),padding:"8px 12px"}}>↻</button>
            <div style={{display:"flex",alignItems:"center",gap:6,background:"#F7FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:isMobile?"5px 8px":"6px 12px"}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:getAvatarColor(myName),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>{myName[0]}</div>
              {!isMobile&&<span style={{fontSize:13,fontWeight:600}}>{myName}</span>}
              <span title="이름 변경" onClick={()=>{try{sessionStorage.removeItem("ts-name");}catch{}setMyName("");setNameInput("");}} style={{fontSize:14,color:"#718096",cursor:"pointer"}}>⏏</span>
            </div>
          </div>
        </div>
        <div style={{flex:1,overflowX:"auto",overflowY:"auto",padding:isMobile?"10px 8px 72px 8px":isTablet?"16px 16px":"24px 28px"}}>
          {activeMenu==="대시보드"&&<Dashboard schedules={schedules} trips={trips} tasks={tasks} todaySchedules={todaySchedules} weekSchedules={weekSchedules} weekTrips={weekTrips} urgentSchedules={urgentSchedules} inProgressTasks={inProgressTasks} overdueTasks={overdueTasks} setActiveMenu={setActiveMenu} todayStr={todayStr} weekEndStr={weekEndStr} isMobile={isMobile} onSchedClick={s=>{setCurrentMonth(new Date(s.start_date+"T00:00:00"));setSelectedSched(s);setActiveMenu("캘린더(주요일정)");}} onTripClick={s=>{setCurrentMonth2(new Date(s.start_date+"T00:00:00"));setSelectedSched2(s);setActiveMenu("캘린더(출장일정)");}}/>}
          {activeMenu==="일정 관리"&&<ScheduleBoard schedules={schedules} onEdit={s=>{setEditingSched(s);setShowSchedModal(true);}} onDelete={deleteSched} isMobile={isMobile}/>}
          {activeMenu==="업무 관리"&&<TaskBoard tasks={tasks} onEdit={t=>{setEditingTask(t);setShowTaskModal(true);}} onDelete={deleteTask} onStatusChange={updateTaskStatus} isMobile={isMobile}/>}
          {activeMenu==="캘린더(주요일정)"&&<CalendarView schedules={schedules} currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} todayStr={todayStr} selectedSched={selectedSched} setSelectedSched={setSelectedSched} onDateClick={d=>{setEditingSched(null);setShowSchedModal({prefillDate:d});}} onEditSched={s=>{setEditingSched(s);setShowSchedModal(true);}} onDeleteSched={deleteSched} isMobile={isMobile}/>}
          {activeMenu==="캘린더(출장일정)"&&<CalendarView schedules={trips} currentMonth={currentMonth2} setCurrentMonth={setCurrentMonth2} todayStr={todayStr} selectedSched={selectedSched2} setSelectedSched={setSelectedSched2} onDateClick={d=>{setEditingTrip(null);setShowTripModal({prefillDate:d});}} onEditSched={s=>{setEditingTrip(s);setShowTripModal(true);}} onDeleteSched={deleteTrip} showOwner={true} isMobile={isMobile}/>}
          {activeMenu==="캘린더(연차일정)"&&<CalendarView schedules={leaves} currentMonth={currentMonth3} setCurrentMonth={setCurrentMonth3} todayStr={todayStr} selectedSched={selectedSched3} setSelectedSched={setSelectedSched3} onDateClick={d=>{setEditingLeave(null);setShowLeaveModal({prefillDate:d});}} onEditSched={s=>{setEditingLeave(s);setShowLeaveModal(true);}} onDeleteSched={deleteLeave} showOwner={true} isMobile={isMobile}/>}
          {activeMenu==="현장별PM"&&<SitePMBoard/>}
          {activeMenu==="리포트"&&<Reports schedules={schedules} tasks={tasks}/>}
        </div>
      </div>

      {/* 모달들 */}
      {showSchedModal&&<SchedModal initial={editingSched||(showSchedModal?.prefillDate?{...newSchedDef,start_date:showSchedModal.prefillDate,end_date:showSchedModal.prefillDate}:newSchedDef)} onSave={saveSched} onClose={()=>{setShowSchedModal(false);setEditingSched(null);}} isEdit={!!editingSched}/>}
      {showTripModal&&<SchedModal initial={editingTrip||(showTripModal?.prefillDate?{...newTripDef,start_date:showTripModal.prefillDate,end_date:showTripModal.prefillDate}:newTripDef)} onSave={saveTrip} onClose={()=>{setShowTripModal(false);setEditingTrip(null);}} isEdit={!!editingTrip} modalTitle="출장일정"/>}
      {showLeaveModal&&<SchedModal initial={editingLeave||(showLeaveModal?.prefillDate?{...newLeaveDef,start_date:showLeaveModal.prefillDate,end_date:showLeaveModal.prefillDate}:newLeaveDef)} onSave={saveLeave} onClose={()=>{setShowLeaveModal(false);setEditingLeave(null);}} isEdit={!!editingLeave} modalTitle="연차일정"/>}
      {showTaskModal&&<TaskModal_ initial={editingTask||newTaskDef} onSave={saveTask} onClose={()=>{setShowTaskModal(false);setEditingTask(null);}} isEdit={!!editingTask}/>}
      {confirmDlg&&(
        <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#FFFFFF",border:"1px solid #FEB2B2",borderRadius:16,padding:"28px 32px",maxWidth:380,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>🗑️</div>
            <p style={{color:"#2D3748",fontSize:15,fontWeight:600,marginBottom:20}}>{confirmDlg.message}</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>setConfirmDlg(null)} style={{...btn("#CBD5E0","#4A5568"),padding:"10px 24px"}}>취소</button>
              <button onClick={()=>{confirmDlg.onConfirm();setConfirmDlg(null);}} style={{...btn("#F87171"),padding:"10px 24px"}}>삭제</button>
            </div>
          </div>
        </div>
      )}
    {/* 모바일 하단 내비 */}
      <div className="mobile-nav" style={{display:isMobile?"flex":"none",position:"fixed",bottom:0,left:0,right:0,background:"#FFFFFF",borderTop:"1px solid #CBD5E0",zIndex:50,padding:"6px 0",justifyContent:"space-around",alignItems:"center"}}>
        {menus.map(m=>(
          <div key={m} onClick={()=>setActiveMenu(m)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 8px",cursor:"pointer",color:activeMenu===m?"#6C63FF":"#718096",flex:1}}>
            <span style={{fontSize:18}}>{menuIcons[m]}</span>
            <span style={{fontSize:9,fontWeight:activeMenu===m?700:400,textAlign:"center",lineHeight:1.2}}>{m.replace("캘린더(","").replace(")","").replace("일정 관리","일정").replace("업무 관리","업무")}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 대시보드 ──────────────────────────────────────────
function Dashboard({schedules,trips,tasks,todaySchedules,weekSchedules,weekTrips,urgentSchedules,inProgressTasks,overdueTasks,setActiveMenu,todayStr,weekEndStr,onSchedClick,onTripClick,isMobile=false}){
  return (
    <div>
      {/* 통계 카드 */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(6,1fr)",gap:isMobile?10:16,marginBottom:isMobile?16:24}}>
        {[
          {label:"오늘 일정",value:todaySchedules.length,icon:"📅",color:"#6C63FF",bg:"#EDE9FE",border:"#C4B5FD",onClick:()=>setActiveMenu("캘린더(주요일정)")},
          {label:"이번주 일정",value:weekSchedules.length,icon:"🗓",color:"#9D174D",bg:"#FDF2F8",border:"#FBCFE8",onClick:()=>setActiveMenu("캘린더(주요일정)")},
          {label:"이번주 출장일정",value:(weekTrips||[]).length,icon:"✈️",color:"#C2410C",bg:"#FFF7ED",border:"#FED7AA",onClick:()=>setActiveMenu("캘린더(출장일정)")},
          {label:"할 일",value:tasks.filter(t=>t.status==="할 일").length,icon:"📋",color:"#4338CA",bg:"#EEF2FF",border:"#C7D2FE",onClick:()=>setActiveMenu("업무 관리")},
          {label:"진행 중 업무",value:inProgressTasks.length,icon:"⚡",color:"#0F766E",bg:"#F0FDFA",border:"#99F6E4",onClick:()=>setActiveMenu("업무 관리")},
          {label:"기한 초과 업무",value:overdueTasks.length,icon:"🚨",color:"#DC2626",bg:overdueTasks.length>0?"#FFF5F5":"#FEF2F2",border:overdueTasks.length>0?"#FCA5A5":"#FECACA",onClick:()=>setActiveMenu("업무 관리"),alert:overdueTasks.length>0},
        ].map(s=>(
          <div key={s.label} onClick={s.onClick}
            style={{background:s.bg,border:`1.5px solid ${s.border}`,borderRadius:14,padding:"20px 22px",cursor:s.onClick?"pointer":"default",transition:"transform 0.2s, box-shadow 0.2s",position:"relative",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}
            onMouseEnter={e=>{if(s.onClick){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,0.10)";}}}
            onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.06)";}}>
            {s.alert&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#F87171,#FF4D6D)",borderRadius:"14px 14px 0 0"}}/>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <p style={{margin:"0 0 8px",fontSize:12,fontWeight:600,color:"#718096"}}>{s.label}</p>
                <p style={{margin:0,fontSize:28,fontWeight:800,color:s.color}}>{s.value}</p>
              </div>
              <div style={{width:44,height:44,borderRadius:12,background:"rgba(255,255,255,0.7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>{s.icon}</div>
            </div>
          </div>
        ))}
      </div>

      {/* 기한 초과 배너 */}
      {overdueTasks.length>0&&(
        <div style={{background:"linear-gradient(90deg,rgba(248,113,113,0.08),rgba(255,77,109,0.05))",border:"1px solid #FEB2B2",borderRadius:14,padding:"14px 20px",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <span style={{fontSize:18}}>🚨</span>
            <h3 style={{margin:0,fontSize:14,fontWeight:800,color:"#F87171"}}>기한 초과 업무 {overdueTasks.length}건 — 즉시 확인이 필요합니다</h3>
            <button onClick={()=>setActiveMenu("업무 관리")} style={{marginLeft:"auto",...btn("#F87171"),fontSize:11,padding:"4px 12px"}}>업무 관리로 이동 →</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {overdueTasks.slice(0,5).map(t=>{
              const pc=PART_COLORS[t.part];
              const sc=STATUS_COLORS[t.status]||STATUS_COLORS["할 일"];
              const daysOver=Math.floor((new Date()-new Date(t.due_date+"T00:00:00"))/(1000*60*60*24));
              return <div key={t.id} style={{display:"grid",gridTemplateColumns:"120px 1fr 110px 130px 80px",gap:10,alignItems:"center",background:"rgba(0,0,0,0.05)",borderRadius:8,padding:"8px 14px",borderLeft:"3px solid #F87171"}}>
                {t.part?<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:pc?.bg||"#CBD5E0",color:pc?.text||"#4A5568",border:`1px solid ${pc?.border||"#A0AEC0"}`,fontWeight:700}}>{t.part}</span>:<span style={{fontSize:10,color:"#A0AEC0"}}>—</span>}
                <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</p>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:getAvatarColor(t.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff",flexShrink:0}}>{(t.owner_name||"?")[0]}</div>
                  <span style={{fontSize:12,color:"#6C63FF",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.owner_name}</span>
                </div>
                <span style={{fontSize:11,color:"#F87171",fontWeight:700}}>{t.due_date}<span style={{fontSize:10,color:"#FC8181",marginLeft:3}}>({getDayOfWeek(t.due_date)}) {daysOver}일 초과</span></span>
                <span style={{fontSize:10,padding:"2px 7px",borderRadius:6,background:sc.bg,color:sc.text,fontWeight:700,border:`1px solid ${sc.border}`}}>{t.status}</span>
              </div>;
            })}
            {overdueTasks.length>5&&<p style={{margin:0,fontSize:11,color:"#F87171",textAlign:"center",paddingTop:4}}>외 {overdueTasks.length-5}건 더...</p>}
          </div>
        </div>
      )}

      {/* 준공 임박 현장 배너 */}
      {(()=>{
        const STORAGE_KEY="teamsync-site-pm-v2";
        let sites=[];
        try{const d=localStorage.getItem(STORAGE_KEY);if(d)sites=JSON.parse(d);}catch{}
        const today=new Date();
        const urgent=sites.filter(s=>{
          if(!s.completion)return false;
          const diff=Math.ceil((new Date(s.completion+"T00:00:00")-today)/(1000*60*60*24));
          return diff>=0&&diff<=30;
        }).sort((a,b)=>a.completion.localeCompare(b.completion));
        if(urgent.length===0)return null;
        return <div style={{background:"linear-gradient(90deg,rgba(245,158,11,0.08),rgba(248,113,113,0.05))",border:"1px solid #FBBF24",borderRadius:14,padding:"14px 20px",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <span style={{fontSize:18}}>🏗</span>
            <h3 style={{margin:0,fontSize:14,fontWeight:800,color:"#D97706"}}>준공 임박 현장 {urgent.length}건 — D-30일 이내</h3>
            <button onClick={()=>setActiveMenu("현장별PM")} style={{marginLeft:"auto",...btn("#F59E0B"),fontSize:11,padding:"4px 12px"}}>현장 현황 →</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {urgent.map(s=>{
              const days=Math.ceil((new Date(s.completion+"T00:00:00")-today)/(1000*60*60*24));
              return <div key={s.id} style={{display:"flex",alignItems:"center",gap:12,background:"#fff",borderRadius:10,padding:"10px 16px",border:"1px solid #FDE68A",borderLeft:"4px solid #F59E0B"}}>

      })()}

      {/* 하단 섹션 - 6개 카드를 하나의 그리드로 정렬 */}

        <SecCard title="할 일 (1주일 이내)" accent="#818CF8">{sortTasks(tasks.filter(t=>t.status==="할 일"&&(!t.due_date||(t.due_date>=todayStr&&t.due_date<=weekEndStr)))).length===0?<Empty text="1주일 이내 할 일 없음"/>:sortTasks(tasks.filter(t=>t.status==="할 일"&&(!t.due_date||(t.due_date>=todayStr&&t.due_date<=weekEndStr)))).map(t=><TaskRow key={t.id} t={t}/>)}</SecCard>
        <SecCard title="진행 중 업무 (1주일 이내)" accent="#2EC4B6">{inProgressTasks.filter(t=>!t.due_date||(t.due_date>=todayStr&&t.due_date<=weekEndStr)).length===0?<Empty text="1주일 이내 진행 중 업무 없음"/>:inProgressTasks.filter(t=>!t.due_date||(t.due_date>=todayStr&&t.due_date<=weekEndStr)).map(t=><TaskRow key={t.id} t={t}/>)}</SecCard>
        <SecCard title="업무 현황" accent="#F9A8D4">
          {TASK_STATUSES.map(st=>{const count=tasks.filter(t=>t.status===st).length;const pct=tasks.length?Math.round(count/tasks.length*100):0;const c=STATUS_COLORS[st];return <div key={st} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:c.text}}>{st}</span><span style={{fontSize:12,color:"#718096"}}>{count}개 ({pct}%)</span></div><div style={{height:6,background:"#CBD5E0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:c.border,borderRadius:3,transition:"width 0.5s"}}/></div></div>;})}
        </SecCard>
      </div>
    </div>
  );
}
function SecCard({title,accent,children}){return <div style={{background:"#FFFFFF",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:`2px solid ${accent}33`,borderRadius:14,padding:"18px 20px"}}><h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:accent}}>{title}</h3>{children}</div>;}

function TaskRow({t}){const c=STATUS_COLORS[t.status]||STATUS_COLORS["할 일"];return <div style={{padding:"8px 0",borderBottom:"1px solid #EEF2F7"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}><span style={{fontSize:13,fontWeight:600,flex:1,paddingRight:8}}>{t.title}</span><span style={{fontSize:11,color:c.text,padding:"2px 7px",borderRadius:5,background:c.bg,flexShrink:0}}>{t.status}</span></div>{t.owner_name&&<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}><div style={{width:16,height:16,borderRadius:"50%",background:getAvatarColor(t.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff",flexShrink:0}}>{t.owner_name[0]}</div><span style={{fontSize:11,color:"#6C63FF",fontWeight:600}}>{t.owner_name}</span></div>}<div style={{display:"flex",gap:10,margin:"3px 0 4px",flexWrap:"wrap"}}>{t.start_date&&<p style={{margin:0,fontSize:10,color:"#4A5568"}}>🗓 시작: {t.start_date} ({getDayOfWeek(t.start_date)})</p>}{t.due_date&&<p style={{margin:0,fontSize:10,color:"#FB923C"}}>📅 완료예정: {t.due_date} ({getDayOfWeek(t.due_date)})</p>}</div><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,height:5,background:"#CBD5E0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${t.progress}%`,background:c.border,borderRadius:3}}/></div><span style={{fontSize:11,color:"#718096",flexShrink:0}}>{t.progress}%</span></div></div>;}

// ── 일정 관리 (리스트형) ──────────────────────────────
function ScheduleBoard({schedules,onEdit,onDelete,isMobile=false}){
  const [priority,setPriority]=useState("all");

  const [showFilter,setShowFilter]=useState(false);
  const sorted=[...schedules].sort((a,b)=>{const d=a.start_date.localeCompare(b.start_date);if(d!==0)return d;return(a.start_time||"00:00").localeCompare(b.start_time||"00:00");});
  const filtered=sorted.filter(s=>{
    if(priority!=="all"&&s.priority!==priority)return false;
    if(dateFrom&&s.start_date<dateFrom)return false;

  const grouped=filtered.reduce((acc,s)=>{const k=s.start_date;if(!acc[k])acc[k]=[];acc[k].push(s);return acc;},{});
  const groupedDates=Object.keys(grouped).sort();

      {groupedDates.map((date,di)=>{

                  {task.part&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:8,background:tpc?.bg||"#CBD5E0",color:tpc?.text||"#4A5568",border:`1px solid ${tpc?.border||"#A0AEC0"}`,fontWeight:700,marginRight:6}}>{task.part}</span>}
                  <p style={{margin:"4px 0 0",fontSize:14,fontWeight:700,lineHeight:1.3}}>{task.title}</p>
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <button onClick={()=>onEdit(task)} style={{...btn("#CBD5E0","#6C63FF"),fontSize:10,padding:"3px 8px"}}>수정</button>
                  <button onClick={()=>onDelete(task.id)} style={{...btn("#CBD5E0","#F87171"),fontSize:10,padding:"3px 8px"}}>삭제</button>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,paddingLeft:8,marginBottom:5}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:getAvatarColor(task.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff",flexShrink:0}}>{(task.owner_name||"?")[0]}</div>
                <span style={{fontSize:12,color:"#6C63FF",fontWeight:600}}>{task.owner_name}</span>
                {task.start_date&&<span style={{fontSize:10,color:"#4A5568",marginLeft:4}}>시작 {task.start_date}</span>}
                {isOverdue&&<span style={{fontSize:10,color:"#F87171",fontWeight:700}}>⚠ 기한초과</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,paddingLeft:8}}>
                <div style={{flex:1,height:6,background:"#CBD5E0",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${task.progress}%`,background:sc.border,borderRadius:3}}/>
                </div>
                <span style={{fontSize:10,color:sc.border,fontWeight:700,flexShrink:0,minWidth:28}}>{task.progress}%</span>
                <select value={task.status} onChange={e=>onStatusChange(task.id,e.target.value)}
                  style={{fontSize:10,padding:"3px 6px",borderRadius:6,border:`1px solid ${sc.border}`,background:sc.bg,color:sc.text,fontWeight:700,cursor:"pointer",outline:"none"}}>
                  {TASK_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>;
            return <div key={task.id}
              style={{display:"grid",gridTemplateColumns:"130px 1fr 110px 110px 110px 90px 160px 90px",gap:10,alignItems:"center",padding:"11px 20px",borderBottom:isLast?"none":"1px solid #EEF2F7",position:"relative",transition:"background 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(108,99,255,0.04)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:tpc?.border||"#A0AEC0",borderRadius:2}}/>
              <div style={{paddingLeft:8}}>{task.part?<span style={{fontSize:10,padding:"3px 9px",borderRadius:10,background:tpc?.bg||"#CBD5E0",color:tpc?.text||"#4A5568",border:`1px solid ${tpc?.border||"#A0AEC0"}`,fontWeight:700}}>{task.part}</span>:<span style={{fontSize:10,color:"#A0AEC0"}}>—</span>}</div>
              <p title={task.title} onClick={e=>{e.currentTarget.style.whiteSpace=e.currentTarget.style.whiteSpace==="normal"?"nowrap":"normal";e.currentTarget.style.overflow=e.currentTarget.style.overflow==="visible"?"hidden":"visible";}} style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer",userSelect:"none"}}>{task.title}</p>
              <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:getAvatarColor(task.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>{(task.owner_name||"?")[0]}</div>
                <span style={{fontSize:12,color:"#6C63FF",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.owner_name}</span>
              </div>
              <span style={{fontSize:12,color:task.start_date?"#2D3748":"#A0AEC0"}}>{task.start_date?<span>{task.start_date} <span style={{color:"#9F7AEA"}}>({getDayOfWeek(task.start_date)})</span></span>:"—"}</span>
              <span style={{fontSize:12,color:isOverdue?"#F87171":task.due_date?"#FB923C":"#A0AEC0",fontWeight:isOverdue?700:400}}>{task.due_date?<span>{task.due_date} <span style={{color:"#9F7AEA"}}>({getDayOfWeek(task.due_date)})</span></span>:"—"}{isOverdue&&<span style={{marginLeft:3}}>⚠</span>}</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{flex:1,height:5,background:"#CBD5E0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${task.progress}%`,background:sc.border,borderRadius:3,transition:"width 0.4s"}}/></div>
                <span style={{fontSize:10,color:sc.border,fontWeight:700,flexShrink:0}}>{task.progress}%</span>
              </div>
              <select value={task.status} onChange={e=>onStatusChange(task.id,e.target.value)}
                style={{fontSize:11,padding:"4px 8px",borderRadius:8,border:`1px solid ${sc.border}`,background:sc.bg,color:sc.text,fontWeight:700,cursor:"pointer",outline:"none"}}>
                {TASK_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                <button onClick={()=>onEdit(task)} style={{...btn("#CBD5E0","#6C63FF"),fontSize:11,padding:"4px 8px"}}>수정</button>
                <button onClick={()=>onDelete(task.id)} style={{...btn("#CBD5E0","#F87171"),fontSize:11,padding:"4px 8px"}}>삭제</button>
              </div>
            </div>;
          })}
        </div>;
      })}
    </div>
  </div>;
}

// ── 캘린더 ────────────────────────────────────────────
function CalendarView({schedules,currentMonth,setCurrentMonth,todayStr,selectedSched,setSelectedSched,onDateClick,onEditSched,onDeleteSched,showOwner=false,isMobile=false}){
  const year=currentMonth.getFullYear(),month=currentMonth.getMonth();
  const days=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();
  const pad=n=>String(n).padStart(2,"0");
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);
  const getDay=ds=>schedules.filter(s=>s.start_date<=ds&&s.end_date>=ds);
  const todayFull=getLocalDateStr(new Date());
  const [expandedDay,setExpandedDay]=useState(null); // +N 클릭 시 날짜 문자열 저장
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
      <button onClick={()=>setCurrentMonth(new Date(year,month-1,1))} style={btn("#EEF2F7","#6C63FF")}>◀</button>
      <h2 style={{margin:0,fontSize:18,fontWeight:800}}>{year}년 {month+1}월</h2>
      <button onClick={()=>setCurrentMonth(new Date(year,month+1,1))} style={btn("#EEF2F7","#6C63FF")}>▶</button>
      <button onClick={()=>setCurrentMonth(new Date())} style={{...btn("#6C63FF"),marginLeft:8}}>오늘</button>
    </div>
    <div style={{background:"#FFFFFF",borderRadius:14,border:"1px solid #CBD5E0",overflowX:"auto"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(80px,1fr))",borderBottom:"1px solid #EEF2F7",minWidth:isMobile?336:560}}>
        {["일","월","화","수","목","금","토"].map((d,i)=><div key={d} className="cal-header-label" style={{padding:isMobile?"6px 0":"12px 0",textAlign:"center",fontSize:isMobile?11:12,fontWeight:700,color:i===0?"#F87171":i===6?"#60A5FA":"#4A5568"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(80px,1fr))",minWidth:isMobile?336:560}}>
        {cells.map((day,idx)=>{
          if(!day)return <div key={`e${idx}`} style={{minHeight:isMobile?50:90,borderRight:"1px solid #CBD5E0",borderBottom:"1px solid #EEF2F7"}}/>;
          const ds=`${year}-${pad(month+1)}-${pad(day)}`;
          const daySch=getDay(ds);
          const isToday=ds===todayFull;
          const holiday=getHoliday(ds);
          const isSun=idx%7===0; const isSat=idx%7===6;
          const col=(isSun||holiday)?"#F87171":isSat?"#60A5FA":"#2D3748";
          return <div key={day} className="cal-day" onClick={()=>onDateClick(ds)}
            style={{minHeight:isMobile?60:90,minWidth:isMobile?48:undefined,padding:isMobile?"3px 2px":"8px 6px",borderRight:"1px solid #CBD5E0",borderBottom:"1px solid #EEF2F7",background:isToday?"#EDE9FE":holiday?"#FFF5F5":"transparent",cursor:"pointer",transition:"background 0.15s",position:"relative",overflow:"visible",zIndex:expandedDay===ds?10:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:1}}>
              <span style={{width:isMobile?20:26,height:isMobile?20:26,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isToday?"#6C63FF":"transparent",fontSize:isMobile?11:13,fontWeight:isToday?800:400,color:isToday?"#fff":col,flexShrink:0}}>{day}</span>
              {!isMobile&&<span className="add-btn" style={{fontSize:16,color:"#6C63FF",fontWeight:700,lineHeight:1,paddingRight:2}}>+</span>}
            </div>
            {!isMobile&&holiday&&<div style={{fontSize:9,color:"#F87171",fontWeight:600,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingLeft:2}}>{holiday}</div>}
            <div style={{display:"flex",flexDirection:"column",gap:1}}>
              {(()=>{
                const isExp=expandedDay===ds;
                const limit=isMobile?2:4;
                const visible=isExp?daySch:daySch.slice(0,limit);
                return <>
                  {visible.map(s=>{const pc=PRIORITY_COLORS[s.priority]||PRIORITY_COLORS.medium;return <div key={s.id} onClick={e=>{e.stopPropagation();setSelectedSched(selectedSched?.id===s.id?null:s);}} style={{fontSize:isMobile?9:11,fontWeight:600,padding:isMobile?"1px 3px":"3px 7px",borderRadius:isMobile?3:5,background:pc.bg,color:pc.text,cursor:"pointer",lineHeight:"1.4",marginBottom:1}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</div>{!isMobile&&showOwner&&s.owner_name&&<div style={{fontSize:10,opacity:0.85,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>👤 {s.owner_name}</div>}</div>;})}
                  {daySch.length>limit&&<div onClick={e=>{e.stopPropagation();setExpandedDay(isExp?null:ds);}} style={{fontSize:isMobile?8:11,color:"#6C63FF",paddingLeft:2,cursor:"pointer",fontWeight:700,userSelect:"none",marginTop:1}}>{isExp?"▲ 접기":`+${daySch.length-limit} 더보기`}</div>}
                </>;
              })()}
            </div>
          </div>;
        })}
      </div>
    </div>
    {selectedSched&&(
      <div style={{marginTop:16,background:"#FFFFFF",border:"1px solid #6C63FF44",borderRadius:14,padding:"18px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#6C63FF"}}>{selectedSched.title}</h3>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>{onEditSched(selectedSched);setSelectedSched(null);}} style={{...btn("#6C63FF"),fontSize:12,padding:"5px 12px"}}>✏️ 수정</button>
            <button onClick={()=>{onDeleteSched(selectedSched.id);setSelectedSched(null);}} style={{...btn("#CBD5E0","#F87171"),fontSize:12,padding:"5px 12px"}}>삭제</button>
            <button onClick={()=>setSelectedSched(null)} style={{background:"none",border:"none",color:"#718096",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
          </div>
        </div>
        <p style={{color:"#4A5568",margin:"8px 0",fontSize:13}}>{selectedSched.description}</p>
        <div style={{display:"flex",gap:20,flexWrap:"wrap",marginTop:8}}>
          <div><p style={{margin:0,fontSize:10,color:"#718096"}}>담당자</p><p style={{margin:"2px 0 0",fontSize:13,color:"#6C63FF",fontWeight:600}}>{selectedSched.owner_name}</p></div>
          <div><p style={{margin:0,fontSize:10,color:"#718096"}}>시작</p><p style={{margin:"2px 0 0",fontSize:13}}>{selectedSched.start_date}{selectedSched.start_time&&" "+selectedSched.start_time}</p></div>
          <div><p style={{margin:0,fontSize:10,color:"#718096"}}>종료</p><p style={{margin:"2px 0 0",fontSize:13}}>{selectedSched.end_date}{selectedSched.end_time&&" "+selectedSched.end_time}</p></div>
          <div><p style={{margin:0,fontSize:10,color:"#718096"}}>중요도</p><p style={{margin:"2px 0 0",fontSize:13}}>{selectedSched.priority==="high"?"높음":selectedSched.priority==="medium"?"중간":"낮음"}</p></div>
        </div>
      </div>
    )}
  </div>;
}

// ── 현장별 PM 현황 ─────────────────────────────────────
function SitePMBoard(){
  const STORAGE_KEY="teamsync-site-pm-v2";
  const defaultSites=[
    {id:"s1",name:"○○ 신축공사",pm:"홍길동",completion:"2025-12-31",location:"서울 강남구",scale:"지상5층",client:"○○건설",memo:""},
    {id:"s2",name:"□□ 리모델링",pm:"이순신",completion:"2026-06-30",location:"경기 수원시",scale:"지상3층",client:"□□주택",memo:""},
  ];
  function loadSites(){try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):defaultSites;}catch{return defaultSites;}}
  const [sites,setSites]=useState(loadSites);
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [searchQ,setSearchQ]=useState("");
  const emptyForm={name:"",pm:"",completion:"",location:"",scale:"",client:"",memo:""};
  const [form,setForm]=useState(emptyForm);
  const sf=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  function saveSite(){
    if(!form.name.trim()||!form.pm.trim()){alert("현장명과 담당PM을 입력하세요.");return;}
    const list=editing?sites.map(s=>s.id===editing.id?{...s,...form}:s):[...sites,{...form,id:`pm${Date.now()}`}];
    setSites(list);
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(list));}catch{}
    setShowModal(false);setEditing(null);setForm(emptyForm);
  }
  function del(id){
    if(!window.confirm("이 현장을 삭제하시겠습니까?"))return;
    const list=sites.filter(s=>s.id!==id);
    setSites(list);
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(list));}catch{}
  }
  function openNew(){setEditing(null);setForm(emptyForm);setShowModal(true);}
  function openEdit(s){setEditing(s);setForm({name:s.name,pm:s.pm,completion:s.completion||"",location:s.location||"",scale:s.scale||"",client:s.client||"",memo:s.memo||""});setShowModal(true);}
  const daysLeft=d=>{if(!d)return null;return Math.ceil((new Date(d+"T00:00:00")-new Date())/(1000*60*60*24));};
  const q=searchQ.trim().toLowerCase();
  const filtered=q?sites.filter(s=>s.name.toLowerCase().includes(q)||s.pm.toLowerCase().includes(q)||(s.location||"").toLowerCase().includes(q)||(s.client||"").toLowerCase().includes(q)):sites;
  const inpSt={width:"100%",border:"1px solid #CBD5E0",borderRadius:8,padding:"10px 12px",fontSize:14,color:"#2D3748",outline:"none",boxSizing:"border-box"};
  const lbl=(t,req)=><label style={{display:"block",fontSize:12,fontWeight:700,color:"#4A5568",marginBottom:5}}>{t}{req&&<span style={{color:"#F87171"}}> *</span>}</label>;
  return <div>
    {/* 검색 + 추가 버튼 */}
    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:200,position:"relative"}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#A0AEC0",fontSize:16,pointerEvents:"none"}}>🔍</span>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="현장명 또는 PM 이름으로 검색..."
          style={{width:"100%",border:"1px solid #CBD5E0",borderRadius:10,padding:"10px 12px 10px 38px",fontSize:14,color:"#2D3748",outline:"none",boxSizing:"border-box",background:"#fff"}}/>
        {searchQ&&<button onClick={()=>setSearchQ("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#A0AEC0",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
      </div>
      <span style={{fontSize:13,color:"#718096",whiteSpace:"nowrap"}}>{filtered.length}개 현장</span>
      <button onClick={openNew} style={{...btn("#6C63FF"),fontSize:13,padding:"10px 20px",whiteSpace:"nowrap"}}>+ 현장 추가</button>
    </div>
    {/* 검색 결과 없음 */}
    {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#A0AEC0",fontSize:14}}>
      {q?`"${searchQ}"에 해당하는 현장이 없습니다.`:"등록된 현장이 없습니다."}
    </div>}
    {/* 카드 그리드 */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:18}}>
      {filtered.map(s=>{
        const days=daysLeft(s.completion);
        const urgent=days!==null&&days>=0&&days<=30;
        const done=days!==null&&days<0;
        const barColor=done?"#CBD5E0":urgent?"#F59E0B":"#6C63FF";
        const dTag=done
          ?<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#F7FAFC",color:"#A0AEC0",fontWeight:700,border:"1px solid #CBD5E0"}}>준공완료</span>
          :urgent?<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#FFFBEB",color:"#D97706",fontWeight:800,border:"1px solid #FBBF24"}}>⚠ D-{days}</span>
          :<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#EDE9FE",color:"#6C63FF",fontWeight:700,border:"1px solid #C4B5FD"}}>D-{days??"-"}</span>;
        return <div key={s.id} style={{background:"#fff",border:`1px solid ${urgent?"#FBBF24":done?"#E2E8F0":"#E2E8F0"}`,borderRadius:16,boxShadow:`0 2px 10px rgba(0,0,0,0.07)`,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {/* 상단 컬러바 */}
          <div style={{height:5,background:done?"#CBD5E0":urgent?"linear-gradient(90deg,#FBBF24,#F87171)":"linear-gradient(90deg,#6C63FF,#9F7AEA)"}}/>
          <div style={{padding:"18px 20px",flex:1}}>
            {/* 헤더 행: 현장명 + D-태그 */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div style={{flex:1,paddingRight:8}}>
                <p style={{margin:"0 0 3px",fontSize:11,color:"#A0AEC0",fontWeight:600,letterSpacing:0.5}}>현장명</p>
                <h3 style={{margin:0,fontSize:16,fontWeight:800,color:"#1A1A2E",lineHeight:1.35}}>{s.name}</h3>
              </div>
              {dTag}
            </div>
            {/* PM 정보 */}
            <div style={{display:"flex",alignItems:"center",gap:10,background:"#F8FAFC",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:getAvatarColor(s.pm),display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:"#fff",flexShrink:0}}>{(s.pm||"?")[0]}</div>
              <div>
                <p style={{margin:0,fontSize:11,color:"#A0AEC0",fontWeight:600}}>담당 PM</p>
                <p style={{margin:0,fontSize:15,fontWeight:800,color:"#2D3748"}}>{s.pm||"미지정"}</p>
              </div>
            </div>
            {/* 현장 상세 정보 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {[
                {label:"준공일자",value:s.completion?`${s.completion} (${getDayOfWeek(s.completion)})`:"-",color:done?"#A0AEC0":urgent?"#D97706":"#2D3748"},
                {label:"현장 위치",value:s.location||"-",color:"#4A5568"},
                {label:"규모",value:s.scale||"-",color:"#4A5568"},
                {label:"발주처",value:s.client||"-",color:"#4A5568"},
              ].map(({label,value,color})=><div key={label} style={{background:"#F8FAFC",borderRadius:8,padding:"8px 10px"}}>
                <p style={{margin:"0 0 2px",fontSize:10,color:"#A0AEC0",fontWeight:600}}>{label}</p>
                <p style={{margin:0,fontSize:12,fontWeight:700,color}}>{value}</p>
              </div>)}
            </div>
            {s.memo&&<p style={{margin:0,fontSize:12,color:"#718096",background:"#FFFBEB",borderRadius:8,padding:"8px 10px",lineHeight:1.5,borderLeft:"3px solid #FBBF24"}}>📌 {s.memo}</p>}
          </div>
          {/* 액션 버튼 */}
          <div style={{padding:"10px 20px 14px",display:"flex",gap:8,borderTop:"1px solid #F0F4F8"}}>
            <button onClick={()=>openEdit(s)} style={{flex:1,...btn("#EEF2F7","#6C63FF"),fontSize:12,padding:"7px 0"}}>✏ 수정</button>
            <button onClick={()=>del(s.id)} style={{flex:1,...btn("#FFF5F5","#F87171"),fontSize:12,padding:"7px 0"}}>🗑 삭제</button>
          </div>
        </div>;
      })}
    </div>
    {/* 추가/수정 모달 */}
    {showModal&&<div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16,overflowY:"auto"}}>
      <div style={{background:"#fff",borderRadius:18,padding:"28px 30px",width:"100%",maxWidth:520,boxShadow:"0 8px 40px rgba(0,0,0,0.18)",margin:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#6C63FF"}}>{editing?"현장 정보 수정":"새 현장 추가"}</h2>
          <button onClick={()=>{setShowModal(false);setEditing(null);}} style={{background:"none",border:"none",fontSize:24,color:"#A0AEC0",cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{gridColumn:"1/-1"}}>{lbl("현장명",true)}<input value={form.name} onChange={sf("name")} placeholder="○○ 신축공사" style={inpSt}/></div>
            <div>{lbl("담당 PM",true)}<input value={form.pm} onChange={sf("pm")} placeholder="홍길동" style={inpSt}/></div>
            <div>{lbl("준공일자")}<input type="date" value={form.completion} onChange={sf("completion")} style={inpSt}/></div>
            <div>{lbl("현장 위치")}<input value={form.location} onChange={sf("location")} placeholder="서울 강남구" style={inpSt}/></div>
            <div>{lbl("규모")}<input value={form.scale} onChange={sf("scale")} placeholder="지상 5층" style={inpSt}/></div>
            <div style={{gridColumn:"1/-1"}}>{lbl("발주처")}<input value={form.client} onChange={sf("client")} placeholder="○○건설" style={inpSt}/></div>
            <div style={{gridColumn:"1/-1"}}>{lbl("비고")}<textarea value={form.memo} onChange={sf("memo")} rows={2} placeholder="특이사항 메모" style={{...inpSt,resize:"vertical"}}/></div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:22,justifyContent:"flex-end"}}>
          <button onClick={()=>{setShowModal(false);setEditing(null);}} style={{...btn("#F7FAFC","#718096"),border:"1px solid #CBD5E0"}}>취소</button>
          <button onClick={saveSite} style={btn("#6C63FF")}>저장</button>
        </div>
      </div>
    </div>}
  </div>;
}


// ── 리포트 ────────────────────────────────────────────
function Reports({schedules,tasks}){
  const total=tasks.length;
  const donePct=total?Math.round(tasks.filter(t=>t.status==="완료").length/total*100):0;
  const avgProg=total?Math.round(tasks.reduce((a,t)=>a+Number(t.progress),0)/total):0;
  const pc={high:0,medium:0,low:0};
  schedules.forEach(s=>{if(pc[s.priority]!==undefined)pc[s.priority]++;});
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
    <SecCard title="일정 우선순위 분포" accent="#6C63FF">{Object.entries(pc).map(([p,c])=>{const col=PRIORITY_COLORS[p];const pct=schedules.length?Math.round(c/schedules.length*100):0;return <div key={p} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:col.bg,fontWeight:600}}>{p==="high"?"높음":p==="medium"?"중간":"낮음"}</span><span style={{fontSize:12,color:"#718096"}}>{c}개 ({pct}%)</span></div><div style={{height:8,background:"#CBD5E0",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:col.bg,borderRadius:4}}/></div></div>;})}</SecCard>
    <SecCard title="업무 완료율" accent="#4ADE80">
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:140}}>
        <div style={{position:"relative",width:130,height:130}}>
          <svg width="130" height="130" viewBox="0 0 130 130"><circle cx="65" cy="65" r="55" fill="none" stroke="#CBD5E0" strokeWidth="12"/><circle cx="65" cy="65" r="55" fill="none" stroke="#4ADE80" strokeWidth="12" strokeDasharray={`${2*Math.PI*55*donePct/100} ${2*Math.PI*55}`} strokeLinecap="round" transform="rotate(-90 65 65)"/></svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:26,fontWeight:800,color:"#4ADE80"}}>{donePct}%</span><span style={{fontSize:11,color:"#718096"}}>완료</span></div>
        </div>
      </div>
      <p style={{textAlign:"center",color:"#4A5568",fontSize:13,margin:0}}>평균 진행률: <strong style={{color:"#2D3748"}}>{avgProg}%</strong></p>
    </SecCard>
    <SecCard title="업무 현황 요약" accent="#F9A8D4">{TASK_STATUSES.map(st=>{const count=tasks.filter(t=>t.status===st).length;const c=STATUS_COLORS[st];return <div key={st} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #EEF2F7"}}><span style={{fontSize:13,color:c.text}}>{st}</span><span style={{fontSize:13,fontWeight:700}}>{count}개</span></div>;})}</SecCard>
    <SecCard title="전체 통계" accent="#FB923C">{[["총 일정",schedules.length,"#6C63FF"],["총 업무",tasks.length,"#2EC4B6"],["완료된 업무",tasks.filter(t=>t.status==="완료").length,"#4ADE80"],["고우선 일정",pc.high,"#FF4D6D"]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #EEF2F7"}}><span style={{fontSize:13,color:"#4A5568"}}>{l}</span><span style={{fontSize:16,fontWeight:800,color:c}}>{v}</span></div>)}</SecCard>
  </div>;
}

// ── 모달 공통 ─────────────────────────────────────────
function ModalWrap({title,children,onClose,onSave}){
  const mobileModal=window.innerWidth<=767;
  return <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.45)",display:"flex",alignItems:mobileModal?"flex-end":"center",justifyContent:"center",zIndex:100,padding:mobileModal?0:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:"#FFFFFF",border:"1px solid #CBD5E0",borderRadius:mobileModal?"20px 20px 0 0":16,width:"100%",maxWidth:mobileModal?"100%":480,padding:mobileModal?"20px 16px 32px":"24px 28px",maxHeight:mobileModal?"92vh":"90vh",overflow:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#6C63FF"}}>{title}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#718096",cursor:"pointer",fontSize:22}}>×</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>{children}</div>
      <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={btn("#CBD5E0","#4A5568")}>취소</button>
        <button onClick={onSave} style={btn("#6C63FF")}>저장</button>
      </div>
    </div>
  </div>;
}
function Fld({label,children}){return <div><label style={{display:"block",fontSize:12,fontWeight:600,color:"#4A5568",marginBottom:6}}>{label}</label>{children}</div>;}

function SchedModal({initial,onSave,onClose,isEdit,modalTitle}){
  const [f,setF]=useState({...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const typeLabel=modalTitle||"일정";
  return <ModalWrap title={isEdit?`${typeLabel} 수정`:`새 ${typeLabel} 추가`} onClose={onClose} onSave={()=>{if(!f.title?.trim()||!f.owner_name?.trim()){alert("제목과 담당자를 입력하세요.");return;}onSave(f);}}>
    <Fld label="일정 제목 *"><input value={f.title||""} onChange={e=>s("title",e.target.value)} placeholder="일정 제목을 입력하세요" style={inp}/></Fld>
    <Fld label="설명"><textarea value={f.description||""} onChange={e=>s("description",e.target.value)} rows={3} placeholder="일정 설명 (선택)" style={{...inp,resize:"vertical"}}/></Fld>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="담당자 이름 *"><input value={f.owner_name||""} onChange={e=>s("owner_name",e.target.value)} placeholder="담당자 이름" style={inp}/></Fld>
      <Fld label="이메일 (알림 수신용)"><input type="email" value={f.owner_email||""} onChange={e=>s("owner_email",e.target.value)} placeholder="example@email.com" style={inp}/></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="시작일"><input type="date" value={f.start_date||""} onChange={e=>{const v=e.target.value;setF(p=>({...p,start_date:v,end_date:(!p.end_date||v>p.end_date)?v:p.end_date}));}} style={inp}/></Fld>
      <Fld label="시작 시간"><input type="time" value={f.start_time||""} onChange={e=>s("start_time",e.target.value)} style={inp}/></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="종료일"><input type="date" value={f.end_date||""} onChange={e=>s("end_date",e.target.value)} style={inp}/></Fld>
      <Fld label="종료 시간"><input type="time" value={f.end_time||""} onChange={e=>s("end_time",e.target.value)} style={inp}/></Fld>
    </div>
    <Fld label="중요도"><select value={f.priority||"medium"} onChange={e=>s("priority",e.target.value)} style={inp}><option value="high">높음</option><option value="medium">중간</option><option value="low">낮음</option></select></Fld>
  </ModalWrap>;
}

function TaskModal_({initial,onSave,onClose,isEdit}){
  const [f,setF]=useState({...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <ModalWrap title={isEdit?"업무 수정":"새 업무 추가"} onClose={onClose} onSave={()=>{if(!f.title?.trim()||!f.owner_name?.trim()){alert("제목과 담당자를 입력하세요.");return;}onSave(f);}}>
    <Fld label="업무 제목 *"><input value={f.title||""} onChange={e=>s("title",e.target.value)} placeholder="업무 제목을 입력하세요" style={inp}/></Fld>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="담당자 이름 *"><input value={f.owner_name||""} onChange={e=>s("owner_name",e.target.value)} placeholder="담당자 이름" style={inp}/></Fld>
      <Fld label="파트"><select value={f.part||""} onChange={e=>s("part",e.target.value)} style={inp}><option value="">파트 선택</option>{PARTS.map(p=><option key={p} value={p}>{p}</option>)}</select></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="시작일"><input type="date" value={f.start_date||""} onChange={e=>{const v=e.target.value;setF(p=>({...p,start_date:v,end_date:(!p.end_date||v>p.end_date)?v:p.end_date}));}} style={inp}/></Fld>
      <Fld label="완료 예정일"><input type="date" value={f.due_date||""} onChange={e=>s("due_date",e.target.value)} style={inp}/></Fld>
    </div>
    <Fld label={`진행률: ${f.progress||0}%`}><input type="range" min={0} max={100} value={f.progress||0} onChange={e=>s("progress",Number(e.target.value))} style={{width:"100%",accentColor:"#6C63FF"}}/></Fld>
    <Fld label="상태"><select value={f.status||"할 일"} onChange={e=>s("status",e.target.value)} style={inp}>{TASK_STATUSES.map(x=><option key={x} value={x}>{x}</option>)}</select></Fld>
  </ModalWrap>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('service-worker.js')
        .then(r=>console.log('SW 등록 완료:', r.scope))
        .catch(e=>console.log('SW 등록 실패:', e));

</script>
</body>
