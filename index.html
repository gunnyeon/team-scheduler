<html lang="ko">
<head>
<meta charset="UTF-8"/>

<!-- PWA 기본 설정 -->
<link rel="manifest" href="manifest.json"/>

<meta name="mobile-web-app-capable" content="yes"/>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0F0F1A;color:#E8E8F0;font-family:'Noto Sans KR',sans-serif;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:#1E1E3A;}
  ::-webkit-scrollbar-thumb{background:#3A3A6A;border-radius:3px;}

  select option{background:#1E1E3A;color:#E8E8F0;}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── API 설정 ───────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbz15mqA1Q5uyuCVXaCKfcp_icyzTv6xB0WIVv4HQDEtr6pnAKUTDO-dblfjRU0fMjiIQA/exec";
const SCHED_HEADERS = ["id","title","description","owner_name","owner_email","start_date","start_time","end_date","end_time","priority"];
const TASK_HEADERS  = ["id","title","owner_name","part","start_date","due_date","progress","status"];

async function apiGet(sheet){
  const r=await fetch(`${API_URL}?sheet=${sheet}`);
  const d=await r.json();
  if(!d.ok)return[];
  // Sheets에서 날짜가 Date 객체 문자열로 올 경우 yyyy-MM-dd 형식으로 정규화
  return (d.data||[]).map(row=>{
    const normalized={...row};
    ["start_date","end_date","due_date"].forEach(key=>{
      if(normalized[key]){
        const v=String(normalized[key]);
        // Date 객체 문자열이면 파싱해서 yyyy-MM-dd로 변환
        if(v.includes("T")||v.includes("/")||(!v.match(/^\d{4}-\d{2}-\d{2}$/)&&v.length>0)){
          const dt=new Date(v);
          if(!isNaN(dt)){
            const yy=dt.getFullYear();
            const mm=String(dt.getMonth()+1).padStart(2,"0");
            const dd=String(dt.getDate()).padStart(2,"0");
            normalized[key]=`${yy}-${mm}-${dd}`;
          }
        }
      }
    });
    ["start_time","end_time"].forEach(key=>{
      if(normalized[key]){
        const v=String(normalized[key]);
        // HH:MM 형식이 아니면 정규화
        if(v.includes("T")){
          const dt=new Date(v);
          if(!isNaN(dt)){
            normalized[key]=`${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
          }
        }
      }
    });
    return normalized;
  });
}
async function apiPost(payload){
  const params=new URLSearchParams({payload:JSON.stringify(payload)});
  await fetch(`${API_URL}?${params}`);
}
async function apiInit(sheet,headers){await apiPost({sheet,action:"init",headers});}
async function apiUpsert(sheet,row){await apiPost({sheet,action:"upsert",row});}
async function apiDelete(sheet,id){await apiPost({sheet,action:"delete",id});}

// ── 상수 ──────────────────────────────────────────────
const AVATAR_COLORS=["#6C63FF","#FF6B9D","#2EC4B6","#FB923C","#4ADE80","#F9A8D4","#60A5FA","#FBBF24"];
function getAvatarColor(name){let h=0;for(let c of(name||"?"))h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;return AVATAR_COLORS[h];}
function getDayOfWeek(dateStr){
  if(!dateStr)return"";
  const days=["일","월","화","수","목","금","토"];
  const d=new Date(dateStr+"T00:00:00");
  return isNaN(d)?"":days[d.getDay()];
}

const PRIORITY_COLORS={high:{bg:"#FF4D6D",text:"#fff"},medium:{bg:"#FF9F1C",text:"#fff"},low:{bg:"#2EC4B6",text:"#fff"}};
const TASK_STATUSES=["할 일","진행 중","검토","완료"];
const STATUS_COLORS={"할 일":{bg:"#EEF2FF",border:"#818CF8",text:"#4338CA"},"진행 중":{bg:"#FFF7ED",border:"#FB923C",text:"#C2410C"},"검토":{bg:"#FDF4FF",border:"#C084FC",text:"#7E22CE"},"완료":{bg:"#F0FDF4",border:"#4ADE80",text:"#15803D"}};
const PARTS=["PM파트","기획파트","SUB파트","BS파트","공정파트","안전파트","설계파트"];
const PART_COLORS={"PM파트":{bg:"#1E1B4B",border:"#818CF8",text:"#A5B4FC"},"기획파트":{bg:"#172554",border:"#60A5FA",text:"#93C5FD"},"SUB파트":{bg:"#14532D",border:"#4ADE80",text:"#86EFAC"},"BS파트":{bg:"#4A044E",border:"#E879F9",text:"#F0ABFC"},"공정파트":{bg:"#431407",border:"#FB923C",text:"#FED7AA"},"안전파트":{bg:"#450A0A",border:"#F87171",text:"#FCA5A5"},"설계파트":{bg:"#2E1065",border:"#C084FC",text:"#E9D5FF"}};
const HOLIDAYS={"01-01":"신정","03-01":"삼일절","05-05":"어린이날","06-06":"현충일","08-15":"광복절","10-03":"개천절","10-09":"한글날","12-25":"성탄절","2025-01-28":"설날 연휴","2025-01-29":"설날","2025-01-30":"설날 연휴","2025-05-05":"어린이날/부처님오신날","2025-10-05":"추석 연휴","2025-10-06":"추석","2025-10-07":"추석 연휴","2026-02-16":"설날 연휴","2026-02-17":"설날","2026-02-18":"설날 연휴","2026-05-24":"부처님오신날","2026-09-24":"추석 연휴","2026-09-25":"추석","2026-09-26":"추석 연휴"};
function getHoliday(ds){return HOLIDAYS[ds]||HOLIDAYS[ds.slice(5)]||null;}

const btn=(bg,color="#fff")=>({background:bg,color,border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"});
const inp={width:"100%",background:"#1E1E3A",border:"1px solid #2A2A4A",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#E8E8F0",outline:"none",boxSizing:"border-box"};

// ── 메인 앱 ───────────────────────────────────────────
function App(){
  const [myName,setMyName]=useState(()=>{try{return sessionStorage.getItem("ts-name")||"";}catch{return "";}});
  const [nameInput,setNameInput]=useState("");
  const [activeMenu,setActiveMenu]=useState("대시보드");
  const [schedules,setSchedules]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [syncStatus,setSyncStatus]=useState("동기화됨");
  const [lastSync,setLastSync]=useState(new Date());
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [showSchedModal,setShowSchedModal]=useState(false);
  const [showTaskModal,setShowTaskModal]=useState(false);
  const [editingSched,setEditingSched]=useState(null);
  const [editingTask,setEditingTask]=useState(null);
  const [confirmDlg,setConfirmDlg]=useState(null);
  const [currentMonth,setCurrentMonth]=useState(new Date());
  const [selectedSched,setSelectedSched]=useState(null);
  const initialized=useRef(false);
  const polling=useRef(null);

  const todayStr=new Date().toISOString().slice(0,10);
  const weekEndDate=new Date(); weekEndDate.setDate(weekEndDate.getDate()+6);
  const weekEndStr=weekEndDate.toISOString().slice(0,10);

  const isSaving=useRef(false);

  async function initialize(){
    try{
      setSyncStatus("연결 중");
      await Promise.all([apiInit("schedules",SCHED_HEADERS),apiInit("tasks",TASK_HEADERS)]);
      await loadData();
      initialized.current=true;
    }catch(e){setSyncStatus("오류");}
  }

  async function loadData(){
    if(isSaving.current)return;
    try{
      const [s,t]=await Promise.all([apiGet("schedules"),apiGet("tasks")]);
      setSchedules(s); setTasks(t);
      setLastSync(new Date()); setSyncStatus("동기화됨");
    }catch(e){setSyncStatus("오류");}
  }

  // 저장 직후 호출 - Sheets 반영될 때까지 최대 3회 재시도
  async function loadAfterSave(type, savedId){
    const maxTry=3;
    for(let i=0;i<maxTry;i++){
      await new Promise(r=>setTimeout(r,1500));
      try{
        if(type==="schedules"){
          const s=await apiGet("schedules");
          // 저장한 항목이 Sheets에 반영됐는지 확인
          if(s.find(r=>r.id===savedId)){
            setSchedules(s);
            setLastSync(new Date()); setSyncStatus("동기화됨");
            isSaving.current=false;
            return;
          }
        } else {
          const t=await apiGet("tasks");
          if(t.find(r=>r.id===savedId)){
            setTasks(t);
            setLastSync(new Date()); setSyncStatus("동기화됨");
            isSaving.current=false;
            return;
          }
        }
      }catch(e){}
    }
    // 3회 실패해도 로컬 상태 유지, 폴링에 위임
    isSaving.current=false;
    setSyncStatus("동기화됨");
  }

  useEffect(()=>{
    if(!myName)return;
    if(!initialized.current)initialize();
    polling.current=setInterval(loadData,10000);
    return()=>clearInterval(polling.current);
  },[myName]);

  const todaySchedules  =schedules.filter(s=>s.start_date<=todayStr&&s.end_date>=todayStr);
  const weekSchedules   =schedules.filter(s=>s.start_date<=weekEndStr&&s.end_date>=todayStr);
  const urgentSchedules =schedules.filter(s=>s.end_date>=todayStr&&s.end_date<=weekEndStr);
  const inProgressTasks =tasks.filter(t=>t.status==="진행 중");
  const overdueTasks    =tasks.filter(t=>t.due_date&&t.due_date<todayStr&&t.status!=="완료").sort((a,b)=>a.due_date.localeCompare(b.due_date));

  const menus=["대시보드","캘린더","일정 관리","업무 관리","리포트"];
  const menuIcons={"대시보드":"▦","캘린더":"🗓","일정 관리":"📅","업무 관리":"✓","리포트":"📊"};
  const newSchedDef={title:"",description:"",owner_name:myName||"",owner_email:"",start_date:todayStr,start_time:"09:00",end_date:todayStr,end_time:"18:00",priority:"medium"};
  const newTaskDef={title:"",owner_name:myName||"",part:"",start_date:todayStr,due_date:"",progress:0,status:"할 일"};

  async function saveSched(data){
    const isEdit=!!data.id;
    const row={...data,id:data.id||`s${Date.now()}`};
    const updated=isEdit?schedules.map(s=>s.id===row.id?row:s):[...schedules,row];
    setSchedules(updated);
    setShowSchedModal(false);
    setEditingSched(null);
    isSaving.current=true;
    setSyncStatus("저장중");
    await apiUpsert("schedules",row);
    loadAfterSave("schedules", row.id);
  }
  async function deleteSched(id){
    const target=schedules.find(s=>s.id===id);
    setConfirmDlg({message:`"${target?.title}" 일정을 삭제하시겠습니까?`,onConfirm:async()=>{
      const updated=schedules.filter(s=>s.id!==id);
      setSchedules(updated);
      isSaving.current=true;
      setSyncStatus("저장중");
      await apiDelete("schedules",id);
      isSaving.current=false;
      await loadData();
    }});
  }
  async function saveTask(data){
    const isEdit=!!data.id;
    const row={...data,id:data.id||`t${Date.now()}`};
    const updated=isEdit?tasks.map(t=>t.id===row.id?row:t):[...tasks,row];
    setTasks(updated);
    setShowTaskModal(false);
    setEditingTask(null);
    isSaving.current=true;
    setSyncStatus("저장중");
    await apiUpsert("tasks",row);
    loadAfterSave("tasks", row.id);
  }
  async function deleteTask(id){
    const target=tasks.find(t=>t.id===id);
    setConfirmDlg({message:`"${target?.title}" 업무를 삭제하시겠습니까?`,onConfirm:async()=>{
      const updated=tasks.filter(t=>t.id!==id);
      setTasks(updated);
      isSaving.current=true;
      setSyncStatus("저장중");
      await apiDelete("tasks",id);
      isSaving.current=false;
      await loadData();
    }});
  }
  async function updateTaskStatus(id,status){
    const task=tasks.find(t=>t.id===id);
    if(!task)return;
    const row={...task,status};
    const updated=tasks.map(t=>t.id===id?row:t);
    setTasks(updated);
    isSaving.current=true;
    setSyncStatus("저장중");
    await apiUpsert("tasks",row);
    loadAfterSave("tasks", row.id);
  }

  const [loginError,setLoginError]=useState("");
  const [loginLoading,setLoginLoading]=useState(false);

  async function handleLogin(){
    const n=nameInput.trim();
    if(!n)return;
    setLoginLoading(true);
    setLoginError("");
    try{
      // members 시트 직접 fetch (오류 응답도 확인)
      const res=await fetch(`${API_URL}?sheet=members`);
      const json=await res.json();

      // API 자체 오류
      if(!json.ok){
        setLoginError(`⚠️ 서버 오류: ${json.error||"알 수 없는 오류"}. Apps Script를 재배포하거나 관리자에게 문의하세요.`);
        setLoginLoading(false);
        return;
      }

      const members=json.data||[];

      // members 시트 비어있음
      if(members.length===0){
        setLoginError("⚠️ 허용 목록이 비어있습니다. Sheets members 시트에 이름을 추가하세요.");
        setLoginLoading(false);
        return;
      }

      const allowed=members.map(m=>String(m.name||"").trim()).filter(Boolean);
      if(!allowed.includes(n)){
        setLoginError("❌ 등록되지 않은 이름입니다. 관리자에게 문의하세요.");
        setLoginLoading(false);
        return;
      }
      try{sessionStorage.setItem("ts-name",n);}catch{}
      setMyName(n);
    }catch(e){
      // API_URL 미설정 또는 네트워크 오류
      if(API_URL==="YOUR_APPS_SCRIPT_URL_HERE"){
        setLoginError("⚠️ API URL이 설정되지 않았습니다. index.html의 API_URL을 확인하세요.");
      } else {
        setLoginError(`⚠️ 서버 연결 오류: ${e.message}. API URL과 배포 설정을 확인하세요.`);
      }
    }
    setLoginLoading(false);
  }

  if(!myName) return (
    <div style={{height:"100vh",background:"#0F0F1A",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#161628",border:"1px solid #2A2A4A",borderRadius:20,padding:"44px 48px",width:380,textAlign:"center"}}>
        <div style={{width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,#6C63FF,#FF6B9D)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 20px"}}>🏢</div>
        <h1 style={{margin:"0 0 6px",fontSize:24,fontWeight:800,color:"#A78BFA"}}>TeamSync</h1>
        <p style={{color:"#6B7280",fontSize:13,margin:"0 0 28px"}}>건축공사팀 일정관리 플랫폼</p>
        <p style={{color:"#8B8BAD",fontSize:13,margin:"0 0 10px",textAlign:"left"}}>이름을 입력하고 시작하세요</p>
        <input value={nameInput} onChange={e=>{setNameInput(e.target.value);setLoginError("");}}
          onKeyDown={e=>{if(e.key==="Enter")handleLogin();}}
          placeholder="홍길동" autoFocus
          style={{width:"100%",background:"#1E1E3A",border:`1px solid ${loginError?"#F8717166":"#6C63FF66"}`,borderRadius:10,padding:"11px 14px",fontSize:15,color:"#E8E8F0",outline:"none",boxSizing:"border-box",marginBottom:loginError?8:12}}/>
        {loginError&&<p style={{color:"#F87171",fontSize:12,margin:"0 0 12px",textAlign:"left"}}>{loginError}</p>}
        <button onClick={handleLogin} disabled={loginLoading}
          style={{width:"100%",background:loginLoading?"#2A2A4A":"linear-gradient(90deg,#6C63FF,#9C5CF7)",border:"none",borderRadius:10,padding:12,fontSize:14,fontWeight:700,color:loginLoading?"#6B7280":"#fff",cursor:loginLoading?"not-allowed":"pointer"}}>
          {loginLoading?"확인 중...":"입장하기 →"}
        </button>
        <p style={{color:"#4B4B6B",fontSize:11,marginTop:16}}>※ 건축공사팀 등록 인원만 입장 가능합니다</p>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",height:"100vh",background:"#0F0F1A",color:"#E8E8F0",overflow:"hidden"}}>
      {/* 사이드바 */}
      <div style={{width:sidebarOpen?224:64,transition:"width 0.3s",background:"linear-gradient(180deg,#161628,#1A1A35)",borderRight:"1px solid #2A2A4A",display:"flex",flexDirection:"column",padding:"0 0 16px",flexShrink:0}}>
        <div style={{padding:"20px 16px 24px",borderBottom:"1px solid #2A2A4A",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#6C63FF,#FF6B9D)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🏢</div>
          {sidebarOpen&&<span style={{fontWeight:800,fontSize:15,color:"#A78BFA"}}>TeamSync</span>}
          <div style={{marginLeft:"auto",cursor:"pointer",color:"#6B7280",fontSize:18}} onClick={()=>setSidebarOpen(v=>!v)}>{sidebarOpen?"◀":"▶"}</div>
        </div>
        <nav style={{padding:"16px 8px",flex:1}}>
          {menus.map(m=>(
            <div key={m} onClick={()=>setActiveMenu(m)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:10,marginBottom:4,cursor:"pointer",background:activeMenu===m?"linear-gradient(90deg,rgba(108,99,255,0.2),rgba(255,107,157,0.1))":"transparent",borderLeft:activeMenu===m?"3px solid #6C63FF":"3px solid transparent",color:activeMenu===m?"#A78BFA":"#8B8BAD"}}>
              <span style={{fontSize:16,flexShrink:0}}>{menuIcons[m]}</span>
              {sidebarOpen&&<span style={{fontSize:13,fontWeight:activeMenu===m?700:400,whiteSpace:"nowrap"}}>{m}</span>}
            </div>
          ))}
        </nav>
        <div style={{padding:"0 12px"}}>
          <div style={{background:"#1E1E3A",borderRadius:10,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:syncStatus==="동기화됨"?"#4ADE80":syncStatus==="저장중"?"#FB923C":"#F87171",flexShrink:0,boxShadow:syncStatus==="동기화됨"?"0 0 6px #4ADE80":"none"}}/>
            {sidebarOpen&&<span style={{fontSize:11,color:"#6B7280",flex:1}}>{syncStatus==="동기화됨"?"실시간 동기화":syncStatus==="저장중"?"저장 중...":syncStatus}</span>}
          </div>
        </div>
      </div>

      {/* 메인 */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 28px",borderBottom:"1px solid #2A2A4A",background:"#0F0F1A",display:"flex",alignItems:"center",gap:16,flexShrink:0}}>
          <div>
            <h1 style={{margin:0,fontSize:20,fontWeight:800}}>{activeMenu}</h1>
            <p style={{margin:0,fontSize:12,color:"#6B7280"}}>마지막 동기화: {lastSync.toLocaleTimeString("ko-KR")}</p>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
            {activeMenu==="일정 관리"&&<button onClick={()=>{setEditingSched(null);setShowSchedModal(true);}} style={btn("#6C63FF")}>+ 일정 추가</button>}
            {activeMenu==="업무 관리"&&<button onClick={()=>{setEditingTask(null);setShowTaskModal(true);}} style={btn("#2EC4B6")}>+ 업무 추가</button>}
            <button onClick={loadData} style={btn("#2A2A4A","#A78BFA")}>↻</button>
            <div style={{display:"flex",alignItems:"center",gap:8,background:"#1E1E3A",borderRadius:10,padding:"6px 12px"}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:getAvatarColor(myName),display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff"}}>{myName[0]}</div>

// ── 일정 관리 (리스트형) ──────────────────────────────
function ScheduleBoard({schedules,onEdit,onDelete}){
  const [priority,setPriority]=useState("all");
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [nameFilter,setNameFilter]=useState("");
  const [showFilter,setShowFilter]=useState(false);
  const sorted=[...schedules].sort((a,b)=>{const d=a.start_date.localeCompare(b.start_date);if(d!==0)return d;return(a.start_time||"00:00").localeCompare(b.start_time||"00:00");});
  const filtered=sorted.filter(s=>{
    if(priority!=="all"&&s.priority!==priority)return false;
    if(dateFrom&&s.start_date<dateFrom)return false;
    if(dateTo&&s.start_date>dateTo)return false;
    if(nameFilter&&!s.owner_name?.toLowerCase().includes(nameFilter.toLowerCase()))return false;
    return true;
  });
  const hasFilter=priority!=="all"||dateFrom||dateTo||nameFilter;
  const grouped=filtered.reduce((acc,s)=>{const k=s.start_date;if(!acc[k])acc[k]=[];acc[k].push(s);return acc;},{});
  const groupedDates=Object.keys(grouped).sort();
  const DAY_NAMES=["일","월","화","수","목","금","토"];
  return <div>
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      {["all","high","medium","low"].map(f=>(
        <button key={f} onClick={()=>setPriority(f)} style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:priority===f?"#6C63FF":"#1E1E3A",color:priority===f?"#fff":"#8B8BAD"}}>
          {f==="all"?"전체":f==="high"?"높음":f==="medium"?"중간":"낮음"}
        </button>
      ))}
      <button onClick={()=>setShowFilter(v=>!v)} style={{padding:"6px 14px",borderRadius:20,border:showFilter?"1px solid #6C63FF":"1px solid #2A2A4A",cursor:"pointer",fontSize:12,fontWeight:600,background:showFilter?"rgba(108,99,255,0.2)":"#1E1E3A",color:"#A78BFA"}}>
        🔍 필터{hasFilter?" ●":""}
      </button>
      <span style={{marginLeft:"auto",fontSize:12,color:"#6B7280"}}>총 {filtered.length}개</span>
    </div>
    {showFilter&&(
      <div style={{background:"#161628",border:"1px solid #2A2A4A",borderRadius:12,padding:"16px 20px",marginBottom:16,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <div><label style={{display:"block",fontSize:11,color:"#8B8BAD",marginBottom:5,fontWeight:600}}>시작일 (이후)</label><input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={inp}/></div>
        <div><label style={{display:"block",fontSize:11,color:"#8B8BAD",marginBottom:5,fontWeight:600}}>시작일 (이전)</label><input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={inp}/></div>
        <div><label style={{display:"block",fontSize:11,color:"#8B8BAD",marginBottom:5,fontWeight:600}}>담당자 이름</label><input value={nameFilter} onChange={e=>setNameFilter(e.target.value)} placeholder="이름 검색..." style={inp}/></div>
        {hasFilter&&<div style={{gridColumn:"1/-1",textAlign:"right"}}><button onClick={()=>{setPriority("all");setDateFrom("");setDateTo("");setNameFilter("");}} style={{...btn("#2A2A4A","#F87171"),fontSize:11,padding:"4px 12px"}}>초기화</button></div>}
      </div>
    )}
    <div style={{background:"#1E1E3A",borderRadius:"10px 10px 0 0",padding:"10px 20px",display:"grid",gridTemplateColumns:"1fr 120px 150px 150px 80px 90px",gap:12,alignItems:"center",borderBottom:"1px solid #2A2A4A"}}>
      {["제목","담당자","시작","종료","중요도",""].map((h,i)=>(

        return <div key={date}>
          <div style={{padding:"8px 20px",background:"rgba(108,99,255,0.07)",borderBottom:"1px solid #2A2A4A",display:"flex",alignItems:"center",gap:10}}>

          </div>
          {dayItems.map((s,si)=>{
            const pc=PRIORITY_COLORS[s.priority]||PRIORITY_COLORS.medium;
            const isLast=di===groupedDates.length-1&&si===dayItems.length-1;
            return <div key={s.id}

              onMouseEnter={e=>e.currentTarget.style.background="rgba(108,99,255,0.05)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:pc.bg,borderRadius:2}}/>
              <div style={{minWidth:0,paddingLeft:8}}>
                <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</p>
                {s.description&&<p style={{margin:"2px 0 0",fontSize:11,color:"#6B7280",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.description}</p>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:getAvatarColor(s.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>{(s.owner_name||"?")[0]}</div>
                <span style={{fontSize:12,color:"#A78BFA",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.owner_name}</span>
              </div>
              <span style={{fontSize:12,color:"#E8E8F0"}}>{s.start_date}{s.start_time&&<span style={{color:"#A78BFA",marginLeft:4,fontSize:11}}>{s.start_time}</span>}</span>
              <span style={{fontSize:12,color:"#E8E8F0"}}>{s.end_date}{s.end_time&&<span style={{color:"#A78BFA",marginLeft:4,fontSize:11}}>{s.end_time}</span>}</span>
              <span style={{fontSize:10,padding:"3px 8px",borderRadius:6,background:pc.bg,color:pc.text,fontWeight:700,textAlign:"center"}}>{s.priority==="high"?"높음":s.priority==="medium"?"중간":"낮음"}</span>
              <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                <button onClick={()=>onEdit(s)} style={{...btn("#2A2A4A","#A78BFA"),fontSize:11,padding:"4px 8px"}}>수정</button>
                <button onClick={()=>onDelete(s.id)} style={{...btn("#2A2A4A","#F87171"),fontSize:11,padding:"4px 8px"}}>삭제</button>
              </div>
            </div>;
          })}
        </div>;
      })}
    </div>
  </div>;
}

// ── 업무 관리 (리스트형) ──────────────────────────────
function TaskBoard({tasks,onEdit,onDelete,onStatusChange}){
  const [activePart,setActivePart]=useState("전체");
  const [statusFilter,setStatusFilter]=useState("전체");
  const [nameFilter,setNameFilter]=useState("");
  const visibleTasks=[...tasks]
    .filter(t=>{
      if(activePart!=="전체"&&t.part!==activePart)return false;
      if(statusFilter!=="전체"&&t.status!==statusFilter)return false;
      if(nameFilter&&!t.owner_name?.toLowerCase().includes(nameFilter.toLowerCase()))return false;
      return true;
    })
    .sort((a,b)=>(a.due_date||"9999").localeCompare(b.due_date||"9999"));
  const grouped=visibleTasks.reduce((acc,t)=>{const k=t.part||"미분류";if(!acc[k])acc[k]=[];acc[k].push(t);return acc;},{});
  const groupOrder=activePart==="전체"?[...PARTS,"미분류"].filter(p=>grouped[p]):[activePart];
  const today=new Date().toISOString().slice(0,10);
  return <div>
    <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      {["전체",...PARTS].map(p=>{
        const pc=PART_COLORS[p];
        const count=p==="전체"?tasks.length:tasks.filter(t=>t.part===p).length;
        return <button key={p} onClick={()=>setActivePart(p)} style={{padding:"6px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:600,border:`1px solid ${activePart===p?(pc?.border||"#6C63FF"):"#2A2A4A"}`,background:activePart===p?(pc?.bg||"rgba(108,99,255,0.3)"):"#1E1E3A",color:activePart===p?(pc?.text||"#fff"):"#8B8BAD",display:"flex",alignItems:"center",gap:5}}>{p}<span style={{fontSize:10,opacity:0.7}}>({count})</span></button>;
      })}
    </div>
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      {["전체",...TASK_STATUSES].map(s=>{
        const c=STATUS_COLORS[s];
        return <button key={s} onClick={()=>setStatusFilter(s)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:600,border:"none",background:statusFilter===s?(c?.border||"#6C63FF"):"#1E1E3A",color:statusFilter===s?"#fff":"#8B8BAD"}}>{s}</button>;
      })}
      <input value={nameFilter} onChange={e=>setNameFilter(e.target.value)} placeholder="🔍 담당자 검색" style={{...inp,width:160,fontSize:12,padding:"5px 12px",marginLeft:"auto"}}/>
      <span style={{fontSize:12,color:"#6B7280"}}>총 {visibleTasks.length}건</span>
    </div>
    <div style={{background:"#1E1E3A",borderRadius:"10px 10px 0 0",padding:"10px 20px",display:"grid",gridTemplateColumns:"130px 1fr 110px 110px 90px 160px 90px",gap:10,alignItems:"center",borderBottom:"1px solid #2A2A4A"}}>
      {["파트","제목","담당자","완료예정일","진행률","상태",""].map((h,i)=>(
        <span key={i} style={{fontSize:11,fontWeight:700,color:"#6B7280",textAlign:i===6?"right":"left"}}>{h}</span>
      ))}
    </div>
    <div style={{background:"#161628",border:"1px solid #2A2A4A",borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
      {visibleTasks.length===0&&<Empty text="조건에 맞는 업무가 없습니다."/>}
      {groupOrder.map((part,gi)=>{
        const partTasks=grouped[part]||[];
        const pc=PART_COLORS[part];
        return <div key={part}>
          <div style={{padding:"8px 20px",background:pc?`${pc.bg}99`:"rgba(42,42,74,0.6)",borderBottom:"1px solid #2A2A4A",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:12,fontWeight:800,color:pc?.text||"#A78BFA"}}>{part}</span>
            <span style={{fontSize:11,color:pc?.border||"#6B7280"}}>{partTasks.length}건</span>
          </div>
          {partTasks.map((task,ti)=>{
            const tpc=PART_COLORS[task.part];
            const sc=STATUS_COLORS[task.status]||STATUS_COLORS["할 일"];
            const isLast=gi===groupOrder.length-1&&ti===partTasks.length-1;
            const isOverdue=task.due_date&&task.due_date<today&&task.status!=="완료";
            return <div key={task.id}
              style={{display:"grid",gridTemplateColumns:"130px 1fr 110px 110px 90px 160px 90px",gap:10,alignItems:"center",padding:"11px 20px",borderBottom:isLast?"none":"1px solid #2A2A4A22",position:"relative",transition:"background 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(108,99,255,0.05)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:tpc?.border||"#3A3A5A",borderRadius:2}}/>
              <div style={{paddingLeft:8}}>{task.part?<span style={{fontSize:10,padding:"3px 9px",borderRadius:10,background:tpc?.bg||"#2A2A4A",color:tpc?.text||"#8B8BAD",border:`1px solid ${tpc?.border||"#3A3A5A"}`,fontWeight:700}}>{task.part}</span>:<span style={{fontSize:10,color:"#4B4B6B"}}>—</span>}</div>
              <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</p>
              <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:getAvatarColor(task.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>{(task.owner_name||"?")[0]}</div>
                <span style={{fontSize:12,color:"#A78BFA",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.owner_name}</span>
              </div>
              <span style={{fontSize:12,color:isOverdue?"#F87171":task.due_date?"#FB923C":"#4B4B6B",fontWeight:isOverdue?700:400}}>{task.due_date?<span>{task.due_date} <span style={{color:"#C4B5FD"}}>({getDayOfWeek(task.due_date)})</span></span>:"—"}{isOverdue&&<span style={{marginLeft:3}}>⚠</span>}</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{flex:1,height:5,background:"#2A2A4A",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${task.progress}%`,background:sc.border,borderRadius:3,transition:"width 0.4s"}}/></div>
                <span style={{fontSize:10,color:sc.border,fontWeight:700,flexShrink:0}}>{task.progress}%</span>
              </div>
              <select value={task.status} onChange={e=>onStatusChange(task.id,e.target.value)}
                style={{fontSize:11,padding:"4px 8px",borderRadius:8,border:`1px solid ${sc.border}`,background:sc.bg,color:sc.text,fontWeight:700,cursor:"pointer",outline:"none"}}>
                {TASK_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                <button onClick={()=>onEdit(task)} style={{...btn("#2A2A4A","#A78BFA"),fontSize:11,padding:"4px 8px"}}>수정</button>
                <button onClick={()=>onDelete(task.id)} style={{...btn("#2A2A4A","#F87171"),fontSize:11,padding:"4px 8px"}}>삭제</button>
              </div>
            </div>;
          })}
        </div>;
      })}
    </div>
  </div>;
}

// ── 캘린더 ────────────────────────────────────────────
function CalendarView({schedules,currentMonth,setCurrentMonth,todayStr,selectedSched,setSelectedSched,onDateClick,onEditSched,onDeleteSched}){
  const year=currentMonth.getFullYear(),month=currentMonth.getMonth();
  const days=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();
  const pad=n=>String(n).padStart(2,"0");
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);
  const getDay=ds=>schedules.filter(s=>s.start_date<=ds&&s.end_date>=ds);
  const todayFull=new Date().toISOString().slice(0,10);
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
      <button onClick={()=>setCurrentMonth(new Date(year,month-1,1))} style={btn("#1E1E3A","#A78BFA")}>◀</button>
      <h2 style={{margin:0,fontSize:18,fontWeight:800}}>{year}년 {month+1}월</h2>
      <button onClick={()=>setCurrentMonth(new Date(year,month+1,1))} style={btn("#1E1E3A","#A78BFA")}>▶</button>
      <button onClick={()=>setCurrentMonth(new Date())} style={{...btn("#6C63FF"),marginLeft:8}}>오늘</button>
    </div>
    <div style={{background:"#161628",borderRadius:14,overflow:"hidden",border:"1px solid #2A2A4A"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"1px solid #2A2A4A"}}>
        {["일","월","화","수","목","금","토"].map((d,i)=><div key={d} style={{padding:"12px 0",textAlign:"center",fontSize:12,fontWeight:700,color:i===0?"#F87171":i===6?"#60A5FA":"#8B8BAD"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
        {cells.map((day,idx)=>{
          if(!day)return <div key={`e${idx}`} style={{minHeight:90,borderRight:"1px solid #2A2A4A",borderBottom:"1px solid #2A2A4A"}}/>;
          const ds=`${year}-${pad(month+1)}-${pad(day)}`;
          const daySch=getDay(ds);
          const isToday=ds===todayFull;
          const holiday=getHoliday(ds);
          const isSun=idx%7===0; const isSat=idx%7===6;
          const col=(isSun||holiday)?"#F87171":isSat?"#60A5FA":"#E8E8F0";
          return <div key={day} className="cal-day" onClick={()=>onDateClick(ds)}
            style={{minHeight:90,padding:"8px 6px",borderRight:"1px solid #2A2A4A",borderBottom:"1px solid #2A2A4A",background:isToday?"rgba(108,99,255,0.08)":holiday?"rgba(248,113,113,0.04)":"transparent",cursor:"pointer",transition:"background 0.15s",position:"relative"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
              <span style={{width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isToday?"#6C63FF":"transparent",fontSize:13,fontWeight:isToday?800:400,color:isToday?"#fff":col}}>{day}</span>
              <span className="add-btn" style={{fontSize:16,color:"#6C63FF",fontWeight:700,lineHeight:1,paddingRight:2}}>+</span>
            </div>
            {holiday&&<div style={{fontSize:9,color:"#F87171",fontWeight:600,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingLeft:2}}>{holiday}</div>}
            <div style={{display:"flex",flexDirection:"column",gap:2}}>
              {daySch.slice(0,2).map(s=>{const pc=PRIORITY_COLORS[s.priority]||PRIORITY_COLORS.medium;return <div key={s.id} onClick={e=>{e.stopPropagation();setSelectedSched(selectedSched?.id===s.id?null:s);}} style={{fontSize:12,fontWeight:600,padding:"3px 7px",borderRadius:5,background:pc.bg,color:pc.text,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:"1.4"}}>{s.title}</div>;})}
              {daySch.length>2&&<div style={{fontSize:12,color:"#6B7280",paddingLeft:4}}>+{daySch.length-2}개</div>}
            </div>
          </div>;
        })}
      </div>
    </div>
    {selectedSched&&(
      <div style={{marginTop:16,background:"#161628",border:"1px solid #6C63FF44",borderRadius:14,padding:"18px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#A78BFA"}}>{selectedSched.title}</h3>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>{onEditSched(selectedSched);setSelectedSched(null);}} style={{...btn("#6C63FF"),fontSize:12,padding:"5px 12px"}}>✏️ 수정</button>
            <button onClick={()=>{onDeleteSched(selectedSched.id);setSelectedSched(null);}} style={{...btn("#2A2A4A","#F87171"),fontSize:12,padding:"5px 12px"}}>삭제</button>
            <button onClick={()=>setSelectedSched(null)} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
          </div>
        </div>
        <p style={{color:"#8B8BAD",margin:"8px 0",fontSize:13}}>{selectedSched.description}</p>
        <div style={{display:"flex",gap:20,flexWrap:"wrap",marginTop:8}}>
          <div><p style={{margin:0,fontSize:10,color:"#6B7280"}}>담당자</p><p style={{margin:"2px 0 0",fontSize:13,color:"#A78BFA",fontWeight:600}}>{selectedSched.owner_name}</p></div>
          <div><p style={{margin:0,fontSize:10,color:"#6B7280"}}>시작</p><p style={{margin:"2px 0 0",fontSize:13}}>{selectedSched.start_date}{selectedSched.start_time&&" "+selectedSched.start_time}</p></div>
          <div><p style={{margin:0,fontSize:10,color:"#6B7280"}}>종료</p><p style={{margin:"2px 0 0",fontSize:13}}>{selectedSched.end_date}{selectedSched.end_time&&" "+selectedSched.end_time}</p></div>
          <div><p style={{margin:0,fontSize:10,color:"#6B7280"}}>중요도</p><p style={{margin:"2px 0 0",fontSize:13}}>{selectedSched.priority==="high"?"높음":selectedSched.priority==="medium"?"중간":"낮음"}</p></div>
        </div>
      </div>
    )}
  </div>;
}

// ── 리포트 ────────────────────────────────────────────
function Reports({schedules,tasks}){
  const total=tasks.length;
  const donePct=total?Math.round(tasks.filter(t=>t.status==="완료").length/total*100):0;
  const avgProg=total?Math.round(tasks.reduce((a,t)=>a+Number(t.progress),0)/total):0;
  const pc={high:0,medium:0,low:0};
  schedules.forEach(s=>{if(pc[s.priority]!==undefined)pc[s.priority]++;});
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
    <SecCard title="일정 우선순위 분포" accent="#6C63FF">{Object.entries(pc).map(([p,c])=>{const col=PRIORITY_COLORS[p];const pct=schedules.length?Math.round(c/schedules.length*100):0;return <div key={p} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:col.bg,fontWeight:600}}>{p==="high"?"높음":p==="medium"?"중간":"낮음"}</span><span style={{fontSize:12,color:"#6B7280"}}>{c}개 ({pct}%)</span></div><div style={{height:8,background:"#2A2A4A",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:col.bg,borderRadius:4}}/></div></div>;})}</SecCard>
    <SecCard title="업무 완료율" accent="#4ADE80">
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:140}}>
        <div style={{position:"relative",width:130,height:130}}>
          <svg width="130" height="130" viewBox="0 0 130 130"><circle cx="65" cy="65" r="55" fill="none" stroke="#2A2A4A" strokeWidth="12"/><circle cx="65" cy="65" r="55" fill="none" stroke="#4ADE80" strokeWidth="12" strokeDasharray={`${2*Math.PI*55*donePct/100} ${2*Math.PI*55}`} strokeLinecap="round" transform="rotate(-90 65 65)"/></svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:26,fontWeight:800,color:"#4ADE80"}}>{donePct}%</span><span style={{fontSize:11,color:"#6B7280"}}>완료</span></div>
        </div>
      </div>
      <p style={{textAlign:"center",color:"#8B8BAD",fontSize:13,margin:0}}>평균 진행률: <strong style={{color:"#E8E8F0"}}>{avgProg}%</strong></p>
    </SecCard>
    <SecCard title="업무 현황 요약" accent="#F9A8D4">{TASK_STATUSES.map(st=>{const count=tasks.filter(t=>t.status===st).length;const c=STATUS_COLORS[st];return <div key={st} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #2A2A4A"}}><span style={{fontSize:13,color:c.text}}>{st}</span><span style={{fontSize:13,fontWeight:700}}>{count}개</span></div>;})}</SecCard>
    <SecCard title="전체 통계" accent="#FB923C">{[["총 일정",schedules.length,"#6C63FF"],["총 업무",tasks.length,"#2EC4B6"],["완료된 업무",tasks.filter(t=>t.status==="완료").length,"#4ADE80"],["고우선 일정",pc.high,"#FF4D6D"]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #2A2A4A"}}><span style={{fontSize:13,color:"#8B8BAD"}}>{l}</span><span style={{fontSize:16,fontWeight:800,color:c}}>{v}</span></div>)}</SecCard>
  </div>;
}

// ── 모달 공통 ─────────────────────────────────────────
function ModalWrap({title,children,onClose,onSave}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:"#161628",border:"1px solid #2A2A4A",borderRadius:16,width:"100%",maxWidth:480,padding:"24px 28px",maxHeight:"90vh",overflow:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#A78BFA"}}>{title}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#6B7280",cursor:"pointer",fontSize:22}}>×</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>{children}</div>
      <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={btn("#2A2A4A","#8B8BAD")}>취소</button>
        <button onClick={onSave} style={btn("#6C63FF")}>저장</button>
      </div>
    </div>
  </div>;
}
function Fld({label,children}){return <div><label style={{display:"block",fontSize:12,fontWeight:600,color:"#8B8BAD",marginBottom:6}}>{label}</label>{children}</div>;}

function SchedModal({initial,onSave,onClose,isEdit}){
  const [f,setF]=useState({...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <ModalWrap title={isEdit?"일정 수정":"새 일정 추가"} onClose={onClose} onSave={()=>{if(!f.title?.trim()||!f.owner_name?.trim()){alert("제목과 담당자를 입력하세요.");return;}onSave(f);}}>
    <Fld label="일정 제목 *"><input value={f.title||""} onChange={e=>s("title",e.target.value)} placeholder="일정 제목을 입력하세요" style={inp}/></Fld>
    <Fld label="설명"><textarea value={f.description||""} onChange={e=>s("description",e.target.value)} rows={3} placeholder="일정 설명 (선택)" style={{...inp,resize:"vertical"}}/></Fld>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="담당자 이름 *"><input value={f.owner_name||""} onChange={e=>s("owner_name",e.target.value)} placeholder="담당자 이름" style={inp}/></Fld>
      <Fld label="이메일 (알림 수신용)"><input type="email" value={f.owner_email||""} onChange={e=>s("owner_email",e.target.value)} placeholder="example@email.com" style={inp}/></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="시작일"><input type="date" value={f.start_date||""} onChange={e=>s("start_date",e.target.value)} style={inp}/></Fld>
      <Fld label="시작 시간"><input type="time" value={f.start_time||""} onChange={e=>s("start_time",e.target.value)} style={inp}/></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="종료일"><input type="date" value={f.end_date||""} onChange={e=>s("end_date",e.target.value)} style={inp}/></Fld>
      <Fld label="종료 시간"><input type="time" value={f.end_time||""} onChange={e=>s("end_time",e.target.value)} style={inp}/></Fld>
    </div>
    <Fld label="중요도"><select value={f.priority||"medium"} onChange={e=>s("priority",e.target.value)} style={inp}><option value="high">높음</option><option value="medium">중간</option><option value="low">낮음</option></select></Fld>
  </ModalWrap>;
}

function TaskModal_({initial,onSave,onClose,isEdit}){
  const [f,setF]=useState({...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <ModalWrap title={isEdit?"업무 수정":"새 업무 추가"} onClose={onClose} onSave={()=>{if(!f.title?.trim()||!f.owner_name?.trim()){alert("제목과 담당자를 입력하세요.");return;}onSave(f);}}>
    <Fld label="업무 제목 *"><input value={f.title||""} onChange={e=>s("title",e.target.value)} placeholder="업무 제목을 입력하세요" style={inp}/></Fld>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="담당자 이름 *"><input value={f.owner_name||""} onChange={e=>s("owner_name",e.target.value)} placeholder="담당자 이름" style={inp}/></Fld>
      <Fld label="파트"><select value={f.part||""} onChange={e=>s("part",e.target.value)} style={inp}><option value="">파트 선택</option>{PARTS.map(p=><option key={p} value={p}>{p}</option>)}</select></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="시작일"><input type="date" value={f.start_date||""} onChange={e=>s("start_date",e.target.value)} style={inp}/></Fld>
      <Fld label="완료 예정일"><input type="date" value={f.due_date||""} onChange={e=>s("due_date",e.target.value)} style={inp}/></Fld>
    </div>
    <Fld label={`진행률: ${f.progress||0}%`}><input type="range" min={0} max={100} value={f.progress||0} onChange={e=>s("progress",Number(e.target.value))} style={{width:"100%",accentColor:"#6C63FF"}}/></Fld>
    <Fld label="상태"><select value={f.status||"할 일"} onChange={e=>s("status",e.target.value)} style={inp}>{TASK_STATUSES.map(x=><option key={x} value={x}>{x}</option>)}</select></Fld>
  </ModalWrap>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

      navigator.serviceWorker.register('service-worker.js')
        .then(r=>console.log('SW 등록 완료:', r.scope))
        .catch(e=>console.log('SW 등록 실패:', e));
